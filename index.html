<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AHMAD RDX TOOLKIT | Global Sync Fixed</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #030712;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #8b5cf6;
            --secondary: #ec4899;
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            background-image: radial-gradient(circle at 20% 20%, #1e1b4b 0%, transparent 40%),
                              radial-gradient(circle at 80% 80%, #312e81 0%, transparent 40%);
            background-attachment: fixed;
            min-height: 100vh;
        }

        /* --- LOGIN PAGE --- */
        #login-screen {
            height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .login-card {
            background: var(--glass); backdrop-filter: blur(25px);
            padding: 40px; border-radius: 30px; border: 1px solid var(--border);
            width: 350px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .login-card h2 { font-size: 1.5rem; margin-bottom: 25px; letter-spacing: 1px; }
        .login-card h2 span { color: var(--accent); }
        .input-group { margin-bottom: 15px; }
        .input-group input {
            width: 100%; padding: 12px; background: rgba(0,0,0,0.4);
            border: 1px solid var(--border); border-radius: 12px; color: white; outline: none;
        }
        .login-btn {
            width: 100%; padding: 12px; border: none; border-radius: 12px;
            background: linear-gradient(to right, var(--accent), var(--secondary));
            color: white; font-weight: 600; cursor: pointer; transition: 0.3s;
        }
        .login-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(139, 92, 246, 0.4); }

        /* --- DASHBOARD --- */
        #app-screen { display: none; }
        header {
            padding: 20px 50px; background: rgba(3, 7, 18, 0.9);
            backdrop-filter: blur(10px); border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100;
        }
        .container { padding: 40px; max-width: 1200px; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }

        /* TOOL CARD WITH LIVE THUMBNAIL */
        .card {
            background: var(--glass); border: 1px solid var(--border);
            border-radius: 20px; padding: 15px; transition: 0.4s; position: relative;
        }
        .card:hover { transform: translateY(-10px); border-color: var(--accent); box-shadow: 0 0 20px rgba(139, 92, 246, 0.2); }
        .aura-box {
            width: 100%; height: 160px; background: white; border-radius: 15px;
            overflow: hidden; margin-bottom: 15px; position: relative;
            border: 1px solid var(--accent);
        }
        .preview-frame { width: 400%; height: 400%; transform: scale(0.25); transform-origin: top left; border: none; pointer-events: none; }
        
        .card h3 { font-size: 1.1rem; margin-bottom: 5px; color: #fff; }
        .branding { font-size: 0.7rem; color: #94a3b8; margin-bottom: 15px; letter-spacing: 1px; }
        .branding span { color: var(--secondary); font-weight: bold; }

        .btn-group { display: flex; gap: 10px; }
        .launch { flex: 1; padding: 10px; border-radius: 10px; border: none; background: var(--accent); color: white; cursor: pointer; font-weight: 500; transition: 0.3s; }
        .launch:hover { background: var(--secondary); }
        .delete-btn { background: rgba(239, 68, 68, 0.2); color: #ef4444; border: none; padding: 10px 15px; border-radius: 10px; cursor: pointer; display: none; }

        /* FAB */
        .fab {
            position: fixed; bottom: 30px; right: 30px; width: 65px; height: 65px;
            border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--secondary)); border: none; color: white;
            font-size: 28px; cursor: pointer; display: none; box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            z-index: 200;
        }

        /* LOADING SPINNER */
        #loader { display: none; color: var(--accent); font-size: 0.9rem; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h2>AHMAD <span>RDX</span> TOOLKIT</h2>
            <div class="input-group"><input type="text" id="u" placeholder="Username"></div>
            <div class="input-group"><input type="password" id="p" placeholder="Password"></div>
            <button class="login-btn" onclick="checkLogin()">Enter Toolkit</button>
            <div id="loader">Syncing with Cloud...</div>
        </div>
    </div>

    <div id="app-screen">
        <header>
            <div style="font-weight: 700; font-size: 1.2rem;">AHMAD RDX <span style="color:var(--accent)">TOOLKIT</span></div>
            <div style="display: flex; gap: 15px; align-items: center;">
                <span id="roleLabel" style="font-size: 0.8rem; color: #94a3b8; background: rgba(255,255,255,0.05); padding: 4px 10px; border-radius: 5px;"></span>
                <button onclick="location.reload()" style="background:none; border:1px solid var(--border); color:white; padding:5px 15px; border-radius:8px; cursor:pointer;">Logout</button>
            </div>
        </header>
        <div class="container">
            <div class="grid" id="toolGrid"></div>
        </div>
        <button class="fab" id="adminAdd" onclick="addNewTool()">+</button>
    </div>

    <script>
        // API CONFIG (Dabba ID Jahan Data Save Hoga)
        const BIN_ID = "66144883ad19ca34f856f671"; 
        const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
        const MASTER_KEY = "$2b$10$6R6C1V2vYm5E4B.S5T1zOu8vA6z4N3B1W7J9Y2K5Z"; 

        let userRole = "";
        let allTools = [];

        function checkLogin() {
            const user = document.getElementById('u').value.trim();
            const pass = document.getElementById('p').value.trim();

            // Your Custom Credentials
            if(user === 'ahmiirdx' && pass === 'ahmad786') {
                userRole = "admin";
                loadDashboard();
            } else if(user === 'ahmadrdx' && pass === 'ahmad123') {
                userRole = "user";
                loadDashboard();
            } else {
                alert("❌ Wrong Access Details!");
            }
        }

        async function loadDashboard() {
            document.getElementById('loader').style.display = 'block';
            
            // Sync data from cloud first
            const success = await fetchTools();
            
            if(success) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-screen').style.display = 'block';
                document.getElementById('roleLabel').innerText = userRole.toUpperCase() + " PANEL";
                if(userRole === 'admin') document.getElementById('adminAdd').style.display = 'block';
                renderUI();
            } else {
                alert("Cloud Sync Failed. Please check connection.");
                document.getElementById('loader').style.display = 'none';
            }
        }

        async function fetchTools() {
            try {
                // Cache buster added to URL (?t=timestamp)
                const res = await fetch(`${API_URL}/latest?t=${Date.now()}`, {
                    headers: { "X-Master-Key": MASTER_KEY }
                });
                const data = await res.json();
                allTools = data.record.tools || [];
                return true;
            } catch (e) {
                console.error(e);
                return false;
            }
        }

        function renderUI() {
            const grid = document.getElementById('toolGrid');
            grid.innerHTML = '';
            
            if(allTools.length === 0) {
                grid.innerHTML = `<p style="grid-column: 1/-1; text-align:center; opacity:0.5;">No tools found in cloud.</p>`;
            }

            allTools.forEach((tool, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="aura-box">
                        <iframe class="preview-frame" srcdoc="${escapeHTML(tool.code)}"></iframe>
                    </div>
                    <h3>${tool.name}</h3>
                    <div class="branding">ENGINEERED BY <span>AHMAD RDX</span></div>
                    <div class="btn-group">
                        <button class="launch" onclick="launchTool(${index})"><i class="fa-solid fa-rocket"></i> Launch</button>
                        <button class="delete-btn" style="display:${userRole==='admin'?'block':'none'}" onclick="deleteTool(${index})">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        async function addNewTool() {
            const name = prompt("Enter Tool Name:");
            const code = prompt("Paste Complete HTML Code:");
            if(!name || !code) return;

            // Optimistic Update (UI pe foran dikhega)
            allTools.push({ name, code });
            renderUI();
            
            // Cloud Update
            await updateCloud();
        }

        async function deleteTool(index) {
            if(confirm("Permanently delete this tool from Cloud?")) {
                allTools.splice(index, 1);
                renderUI();
                await updateCloud();
            }
        }

        async function updateCloud() {
            try {
                const res = await fetch(API_URL, {
                    method: 'PUT',
                    headers: { 
                        'Content-Type': 'application/json',
                        'X-Master-Key': MASTER_KEY,
                        'X-Bin-Versioning': 'false' // Purani version overwrite karega taky sync fast ho
                    },
                    body: JSON.stringify({ tools: allTools })
                });
                if(res.ok) {
                    console.log("Cloud Synced Successfully");
                } else {
                    alert("Sync Error: Cloud rejected the update.");
                }
            } catch (e) { 
                alert("Network Error: Could not reach Cloud."); 
            }
        }

        function launchTool(index) {
            const win = window.open("", "_blank");
            win.document.write(allTools[index].code);
        }

        function escapeHTML(str) {
            return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
        }
    </script>
</body>
</html>
