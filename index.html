<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AHMAR RDX · ToolVault</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#0c0c16;color:#eee;font-family:'Segoe UI',sans-serif;padding:20px;}
    .brand{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
    .brand h1{font-size:1.8rem;background:linear-gradient(135deg,#ff4757,#ff6b81);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .controls{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;}
    input,textarea,button{outline:none;border:none;padding:10px 15px;border-radius:8px;font-family:inherit;}
    input,textarea{background:#1a1a2e;color:#fff;border:1px solid #333;width:200px;}
    textarea{width:300px;height:60px;resize:none;}
    button{background:#ff4757;color:#fff;font-weight:bold;cursor:pointer;transition:.2s;}
    button:hover{background:#ff6b81;}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:15px;}
    .card{background:#14141f;padding:15px;border-radius:10px;border:1px solid #2a2a3a;cursor:pointer;transition:.2s;}
    .card:hover{border-color:#ff4757;}
    .card h3{font-size:1rem;margin-bottom:8px;}
    .card pre{background:#0a0a14;padding:8px;border-radius:5px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;font-size:.7rem;color:#aaa;}
    .modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:none;align-items:center;justify-content:center;z-index:100;}
    .modal.active{display:flex;}
    .modal-box{background:#1a1a28;padding:20px;border-radius:12px;width:95%;max-width:800px;max-height:80vh;overflow:auto;}
    .modal-box iframe{width:100%;height:70vh;border:none;}
    .close{position:absolute;top:10px;right:20px;font-size:1.5rem;cursor:pointer;color:#fff;}
  </style>
</head>
<body>
  <div class="brand">
    <h1>⚡ AHMAR RDX TOOLS</h1>
    <span style="color:#888;">Your own tool collection</span>
  </div>

  <div class="controls">
    <input type="text" id="toolName" placeholder="Tool name...">
    <textarea id="toolCode" placeholder="Paste full HTML here..."></textarea>
    <button onclick="addTool()">➕ Add Tool</button>
    <button onclick="exportTools()" style="background:#333;">📤 Export</button>
    <label style="background:#1a1a2e;padding:8px 15px;border-radius:8px;cursor:pointer;color:#fff;">
      📥 Import <input type="file" id="importFile" accept=".json" hidden onchange="importTools(event)">
    </label>
  </div>

  <div class="grid" id="toolGrid"></div>

  <!-- Run modal -->
  <div class="modal" id="runModal">
    <div class="modal-box">
      <span class="close" onclick="closeRun()">&times;</span>
      <h3 id="runTitle"></h3>
      <iframe id="runFrame" sandbox="allow-scripts allow-forms allow-popups allow-same-origin"></iframe>
    </div>
  </div>

  <script>
    const STORAGE = 'ahmar_tools';
    let tools = JSON.parse(localStorage.getItem(STORAGE)) || [
      { id: '1', name: '🎨 Color Picker', code: '<!DOCTYPE html><html><head><style>body{font-family:sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;margin:0;background:#0c0c16;color:#fff;}input[type=color]{width:80px;height:80px;border:none;border-radius:10px;}.info{background:#1a1a2e;padding:20px;border-radius:10px;margin-top:20px;}</style></head><body><h2>AHMAR RDX</h2><input type="color" id="c" value="#ff4757"><div class="info">HEX: <span id="h">#ff4757</span></div><script>c.oninput=()=>h.textContent=c.value;<\/script></body></html>', time: Date.now() }
    ];

    function save() { localStorage.setItem(STORAGE, JSON.stringify(tools)); }
    function render() {
      const grid = document.getElementById('toolGrid');
      grid.innerHTML = tools.map(t => `
        <div class="card" onclick="run('${t.id}')">
          <h3>${t.name}</h3>
          <pre>${t.code.replace(/<[^>]*>/g,'').substring(0,50)}...</pre>
          <div style="display:flex;gap:6px;margin-top:8px;">
            <button style="font-size:.7rem;padding:4px 10px;" onclick="event.stopPropagation();editTool('${t.id}')">✏️</button>
            <button style="font-size:.7rem;padding:4px 10px;background:#e74c3c;" onclick="event.stopPropagation();deleteTool('${t.id}')">🗑️</button>
          </div>
        </div>
      `).join('');
    }

    window.addTool = function() {
      const name = document.getElementById('toolName').value.trim();
      const code = document.getElementById('toolCode').value.trim();
      if(!name || !code) return alert('Please fill both fields.');
      tools.unshift({ id: Date.now().toString(), name, code, time: Date.now() });
      save(); render();
      document.getElementById('toolName').value = '';
      document.getElementById('toolCode').value = '';
    };

    window.editTool = function(id) {
      const tool = tools.find(t => t.id === id);
      if(!tool) return;
      document.getElementById('toolName').value = tool.name;
      document.getElementById('toolCode').value = tool.code;
      tools = tools.filter(t => t.id !== id); // remove and re-add after edit
      save(); render();
    };

    window.deleteTool = function(id) {
      if(!confirm('Delete?')) return;
      tools = tools.filter(t => t.id !== id);
      save(); render();
    };

    window.run = function(id) {
      const tool = tools.find(t => t.id === id);
      if(!tool) return;
      document.getElementById('runTitle').textContent = '▶️ ' + tool.name;
      document.getElementById('runFrame').srcdoc = tool.code;
      document.getElementById('runModal').classList.add('active');
    };

    window.closeRun = function() {
      document.getElementById('runModal').classList.remove('active');
      document.getElementById('runFrame').srcdoc = '';
    };

    window.exportTools = function() {
      const blob = new Blob([JSON.stringify(tools)], {type:'application/json'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'ahmar-rdx-tools.json';
      a.click();
    };

    window.importTools = function(e) {
      const file = e.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          const data = JSON.parse(ev.target.result);
          data.forEach(t => { if(!tools.find(x=>x.name===t.name && x.code===t.code)) tools.unshift({...t, id:Date.now().toString()}); });
          save(); render();
        } catch{ alert('Invalid file'); }
      };
      reader.readAsText(file);
      e.target.value = '';
    };

    // initial
    render();
  </script>
</body>
</html>
