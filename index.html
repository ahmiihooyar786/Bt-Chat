<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AHMAD RDX TOOLKIT | Premium Secure</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0f172a;
            --primary: #8b5cf6;
            --secondary: #ec4899;
            --text-light: #f8fafc;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(139, 92, 246, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(236, 72, 153, 0.15) 0%, transparent 40%);
            background-attachment: fixed;
            color: var(--text-light);
            min-height: 100vh;
            overflow-x: hidden;
        }

        #login-section {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-box {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            padding: 40px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }
        .login-box h1 {
            font-size: 1.8rem;
            margin-bottom: 5px;
            background: linear-gradient(to right, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }
        .login-box p {
            color: #94a3b8;
            margin-bottom: 25px;
            font-size: 0.9rem;
        }
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .input-group input, .input-group textarea {
            width: 100%;
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }
        .input-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.2);
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(236, 72, 153, 0.3);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(139, 92, 246, 0.4);
        }
        .login-hints {
            margin-top: 15px;
            font-size: 0.8rem;
            color: #64748b;
            background: rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 8px;
        }
        .login-hints b {
            color: #a78bfa;
        }
        .error-msg {
            color: #ef4444;
            font-size: 0.85rem;
            margin-top: 10px;
            min-height: 20px;
        }
        #app-section {
            display: none;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 50;
        }
        .brand h1 {
            font-size: 1.8rem;
            font-weight: 700;
            color: white;
            letter-spacing: 1px;
        }
        .brand h1 span {
            background: linear-gradient(to right, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .user-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .badge {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: #a78bfa;
        }
        .logout-btn {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }
        .logout-btn:hover {
            background: #ef4444;
            color: white;
        }
        .container {
            max-width: 1300px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }
        .tool-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 15px;
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: 0.4s ease;
            position: relative;
        }
        .tool-card:hover {
            transform: translateY(-8px);
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
        }
        .thumbnail-wrapper {
            width: 100%;
            height: 160px;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            margin-bottom: 15px;
            background: var(--card-aura, linear-gradient(135deg, #8b5cf6, #ec4899));
            padding: 2px;
            box-shadow: 0 0 20px var(--card-aura-glow, rgba(139, 92, 246, 0.4));
        }
        .thumbnail-inner {
            width: 100%;
            height: 100%;
            background: #ffffff;
            border-radius: 10px;
            position: relative;
            overflow: hidden;
        }
        .thumbnail-iframe {
            width: 400%;
            height: 400%;
            transform: scale(0.25);
            transform-origin: top left;
            border: none;
            pointer-events: none;
        }
        .thumbnail-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.1);
            z-index: 10;
        }
        .tool-info h3 {
            font-size: 1.2rem;
            color: #f8fafc;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .branding-tag {
            font-size: 0.7rem;
            color: #94a3b8;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }
        .branding-tag span {
            color: var(--secondary);
            font-weight: 600;
        }
        .actions {
            display: flex;
            gap: 10px;
        }
        .launch-btn {
            flex-grow: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            justify-content: center; align-items: center; gap: 8px;
        }
        .launch-btn:hover {
            background: var(--primary);
        }
        .delete-btn {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            cursor: pointer;
            transition: 0.3s;
            display: none;
        }
        .delete-btn:hover {
            background: #ef4444; color: white;
        }
        .fab-btn {
            position: fixed; bottom: 40px; right: 40px;
            width: 65px; height: 65px; border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white; font-size: 24px; border: none; cursor: pointer;
            box-shadow: 0 10px 25px rgba(236, 72, 153, 0.4);
            transition: 0.3s; display: none; z-index: 100;
        }
        .fab-btn:hover { transform: scale(1.1) rotate(90deg); }
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(8px);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000; opacity: 0; visibility: hidden; transition: 0.3s;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-box {
            background: #1e293b; border: 1px solid var(--glass-border);
            padding: 30px; border-radius: 20px; width: 90%; max-width: 600px;
            transform: translateY(20px); transition: 0.3s;
        }
        .modal-overlay.active .modal-box { transform: translateY(0); }
        .modal-header { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .modal-header h2 { color: white; }
        .close-modal { background: none; border: none; color: #94a3b8; font-size: 20px; cursor: pointer; }
        .close-modal:hover { color: white; }
        .input-group textarea { height: 150px; font-family: monospace; }

        @media (max-width: 768px) {
            header { padding: 15px 20px; flex-direction: column; gap: 10px; }
            .thumbnail-wrapper { height: 140px; }
        }
    </style>
</head>
<body>

    <section id="login-section">
        <div class="login-box">
            <h1>Welcome Back</h1>
            <p>AHMAD RDX TOOLKIT</p>

            <div class="input-group">
                <input type="text" id="username" placeholder="Username" autocomplete="off">
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="Password">
            </div>
            <button class="btn" onclick="handleLogin()">Login to Dashboard</button>
            <div class="error-msg" id="errorMsg"></div>
            
            <div class="login-hints">
                <b>🔐 Secure Credentials (Yehi Use Karo):</b><br>
                <b>Admin:</b> user: <b>Contact With Sir</b> | pass: <b>Contact with Sir</b> (Full Access)<br>
                <b>User:</b> user: <b>Contact With Sir</b> | pass: <b>Contact With Sir</b> (View Only)
            </div>
        </div>
    </section>

    <section id="app-section">
        <header>
            <div class="brand">
                <h1>AHMAD <span>RDX</span> TOOLKIT</h1>
            </div>
            <div class="user-controls">
                <span class="badge" id="userRoleBadge">Role</span>
                <span class="badge" id="userNameDisplay" style="background: rgba(139, 92, 246, 0.2); color: #c4b5fd;"></span>
                <button class="logout-btn" onclick="handleLogout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
            </div>
        </header>

        <div class="container">
            <div class="tools-grid" id="toolsGrid">
                <!-- Dynamic Content -->
            </div>
        </div>

        <button class="fab-btn" id="openModalBtn">
            <i class="fa-solid fa-plus"></i>
        </button>

        <div class="modal-overlay" id="addToolModal">
            <div class="modal-box">
                <div class="modal-header">
                    <h2>Deploy New Tool</h2>
                    <button class="close-modal" id="closeModalBtn"><i class="fa-solid fa-xmark"></i></button>
                </div>
                
                <div class="input-group">
                    <input type="text" id="toolName" placeholder="Tool Name (e.g. Chat Editor)">
                </div>

                <div class="input-group">
                    <textarea id="toolCode" placeholder="Paste full HTML code here to generate Live Thumbnail automatically..."></textarea>
                </div>

                <button class="btn" id="saveToolBtn">Add to Toolkit</button>
            </div>
        </div>
    </section>

    <script>
        // ==========================================
        // 🔐 SECURE AUTHENTICATION SYSTEM
        // ==========================================
        
        // Server-side level security using SHA-256 hashing
        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            return hashHex;
        }

        // Pre-computed hashes for REAL credentials
        const VALID_CREDENTIALS = {
            admin: {
                username: 'ahmadrdx',
                passwordHash: '', // Will be set below
                role: 'admin',
                displayName: 'Ahmad RDX'
            },
            user: {
                username: 'ahmiirdx',
                passwordHash: '', // Will be set below
                role: 'user',
                displayName: 'Ahmiir DX'
            }
        };

        // Initialize password hashes
        (async function initAuth() {
            VALID_CREDENTIALS.admin.passwordHash = await sha256('ahmad123');
            VALID_CREDENTIALS.user.passwordHash = await sha256('ahmad786');
            console.log('✅ Secure Auth System Ready');
        })();

        const STORAGE_KEY = 'ahmad_rdx_toolkit_db';
        let myTools = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        let currentUserRole = null;
        let currentUsername = null;

        const auraColors = [
            { bg: 'linear-gradient(135deg, #8b5cf6, #ec4899)', glow: 'rgba(236, 72, 153, 0.4)' },
            { bg: 'linear-gradient(135deg, #3b82f6, #2dd4bf)', glow: 'rgba(45, 212, 191, 0.4)' },
            { bg: 'linear-gradient(135deg, #f59e0b, #ef4444)', glow: 'rgba(239, 68, 68, 0.4)' },
            { bg: 'linear-gradient(135deg, #10b981, #3b82f6)', glow: 'rgba(16, 185, 129, 0.4)' }
        ];

        async function handleLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorMsg = document.getElementById('errorMsg');

            if (!username || !password) {
                errorMsg.textContent = '❌ Please enter both username and password';
                return;
            }

            const passwordHash = await sha256(password);
            let authenticated = false;
            let userRole = null;
            let displayName = '';

            // Check against valid credentials
            for (let [key, cred] of Object.entries(VALID_CREDENTIALS)) {
                if (cred.username === username && cred.passwordHash === passwordHash) {
                    authenticated = true;
                    userRole = cred.role;
                    displayName = cred.displayName;
                    break;
                }
            }

            if (authenticated) {
                currentUserRole = userRole;
                currentUsername = username;
                loginSuccess(displayName);
            } else {
                errorMsg.textContent = '❌ Invalid Username or Password! Please use the credentials shown below.';
                // Shake animation for wrong password
                document.querySelector('.login-box').style.animation = 'shake 0.5s';
                setTimeout(() => {
                    document.querySelector('.login-box').style.animation = '';
                }, 500);
            }
        }

        function loginSuccess(displayName) {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('app-section').style.display = 'block';
            document.getElementById('userRoleBadge').innerText = currentUserRole === 'admin' ? '🛡️ Admin Panel' : '👤 User Panel';
            document.getElementById('userNameDisplay').innerText = `👋 ${displayName}`;
            
            document.getElementById('openModalBtn').style.display = currentUserRole === 'admin' ? 'flex' : 'none';
            document.getElementById('errorMsg').textContent = '';
            
            document.getElementById('username').value = '';
            document.getElementById('password').value = '';
            
            renderTools();
        }

        function handleLogout() {
            currentUserRole = null;
            currentUsername = null;
            document.getElementById('login-section').style.display = 'flex';
            document.getElementById('app-section').style.display = 'none';
        }

        // Allow Enter key to login
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && document.getElementById('login-section').style.display !== 'none') {
                handleLogin();
            }
        });

        // Modal Controls
        const modal = document.getElementById('addToolModal');
        document.getElementById('openModalBtn').addEventListener('click', () => modal.classList.add('active'));
        document.getElementById('closeModalBtn').addEventListener('click', () => modal.classList.remove('active'));
        
        document.getElementById('saveToolBtn').addEventListener('click', () => {
            const name = document.getElementById('toolName').value.trim();
            const code = document.getElementById('toolCode').value.trim();

            if (!name || !code) return alert("Please fill all fields!");

            const randomAura = auraColors[Math.floor(Math.random() * auraColors.length)];

            myTools.push({
                id: Date.now(),
                name: name,
                code: code,
                aura: randomAura,
                addedBy: currentUsername
            });

            localStorage.setItem(STORAGE_KEY, JSON.stringify(myTools));
            renderTools();
            modal.classList.remove('active');
            document.getElementById('toolName').value = '';
            document.getElementById('toolCode').value = '';
        });

        function deleteTool(id) {
            if(confirm("Remove this tool from Toolkit?")) {
                myTools = myTools.filter(t => t.id !== id);
                localStorage.setItem(STORAGE_KEY, JSON.stringify(myTools));
                renderTools();
            }
        }

        function launchTool(id) {
            const tool = myTools.find(t => t.id === id);
            if(tool) {
                const newWindow = window.open("", "_blank");
                newWindow.document.open();
                newWindow.document.write(`<html><head><title>${tool.name} | AHMAD RDX</title></head><body>${tool.code}</body></html>`);
                newWindow.document.close();
            }
        }

        function renderTools() {
            const grid = document.getElementById('toolsGrid');
            grid.innerHTML = '';

            if (myTools.length === 0) {
                grid.innerHTML = `<p style="text-align:center; grid-column: 1/-1; color:#94a3b8; margin-top:50px;">
                    📦 No tools in the toolkit yet. Login as Admin to add tools.</p>`;
                return;
            }

            myTools.forEach(tool => {
                const card = document.createElement('div');
                card.className = 'tool-card';
                
                card.style.setProperty('--card-aura', tool.aura.bg);
                card.style.setProperty('--card-aura-glow', tool.aura.glow);

                const deleteBtnDisplay = currentUserRole === 'admin' ? 'block' : 'none';

                card.innerHTML = `
                    <div class="thumbnail-wrapper">
                        <div class="thumbnail-inner">
                            <iframe class="thumbnail-iframe" srcdoc="${escapeHTML(tool.code)}"></iframe>
                            <div class="thumbnail-overlay"></div>
                        </div>
                    </div>
                    <div class="tool-info">
                        <h3>${tool.name}</h3>
                        <div class="branding-tag">BY <span>AHMAD RDX</span> ${tool.addedBy ? '• Added by ' + tool.addedBy : ''}</div>
                        <div class="actions">
                            <button class="launch-btn" onclick="launchTool(${tool.id})">
                                <i class="fa-solid fa-rocket"></i> Launch
                            </button>
                            <button class="delete-btn" style="display: ${deleteBtnDisplay};" onclick="deleteTool(${tool.id})">
                                <i class="fa-solid fa-trash"></i>
                            </button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function escapeHTML(str) {
            return str.replace(/&/g, '&amp;')
                      .replace(/</g, '&lt;')
                      .replace(/>/g, '&gt;')
                      .replace(/"/g, '&quot;')
                      .replace(/'/g, '&#39;');
        }

        // Shake animation style
        const shakeStyle = document.createElement('style');
        shakeStyle.textContent = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                25% { transform: translateX(-10px); }
                75% { transform: translateX(10px); }
            }
        `;
        document.head.appendChild(shakeStyle);
    </script>
</body>
</html>
