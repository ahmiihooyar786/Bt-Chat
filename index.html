  <link rel="icon" type="image/png" sizes="512x512" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAgAAAAIACAYAAAD0eNT6AAAACXBIWXMAAA7EAAAOxAGVKw4bAAAEeUlEQVR4nO3BAQ0AAADCoPdPbQ8HFAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA8G1uDQABJ0UgGAAAAAElFTkSuQmCC">
  
  <title>Bluetooth Chat Pro</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: radial-gradient(ellipse at 30% 30%, #0f172a, #020617);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
    }

    .app-card {
      width: 100%;
      max-width: 430px;
      height: 94vh;
      background: rgba(15,23,42,0.75);
      backdrop-filter: blur(48px);
      -webkit-backdrop-filter: blur(48px);
      border-radius: 36px;
      border: 1.5px solid rgba(255,255,255,0.08);
      box-shadow: 0 40px 80px rgba(0,0,0,0.6);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      padding: 20px;
      background: rgba(8,12,24,0.5);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, #2563eb, #06b6d4);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    .logo h2 { font-size: 1rem; font-weight: 700; color: #e0f2fe; }
    .logo span { font-size: 0.6rem; color: #64748b; display: block; }

    #statusBadge {
      padding: 7px 15px;
      border-radius: 30px;
      font-size: 0.68rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 7px;
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.4);
      color: #f87171;
    }
    #statusBadge.on { background: rgba(16,185,129,0.15); border-color: rgba(16,185,129,0.5); color: #6ee7b7; }
    #statusDot { width: 8px; height: 8px; border-radius: 50%; background: #ef4444; animation: pulse 1.8s infinite; }
    #statusBadge.on #statusDot { background: #10b981; box-shadow: 0 0 14px #10b981; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }

    .btns { display: flex; padding: 12px 16px; gap: 8px; }
    .btn {
      flex: 1; padding: 13px 6px; border-radius: 26px;
      font-size: 0.72rem; font-weight: 700;
      border: 1px solid rgba(255,255,255,0.1);
      cursor: pointer;
      background: rgba(20,28,45,0.65);
      color: #cbd5e1;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: flex; align-items: center; justify-content: center; gap: 5px;
    }
    .btn:active { transform: scale(0.95); }
    .btn.go {
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: #fff; border: 1px solid rgba(255,255,255,0.25);
      box-shadow: 0 8px 22px rgba(37,99,235,0.45);
    }

    .msgs {
      flex: 1; overflow-y: auto; padding: 14px 12px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .bubble {
      max-width: 82%; padding: 10px 15px; border-radius: 20px;
      font-size: 0.85rem; line-height: 1.45; word-break: break-word;
      animation: pop .25s ease;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: 0 4px 10px rgba(0,0,0,0.25);
    }
    .bubble.sent { align-self: flex-end; background: linear-gradient(135deg,#2563eb,#4f46e5); color:#fff; border-bottom-right-radius:5px; }
    .bubble.received { align-self: flex-start; background: rgba(25,30,48,0.9); color:#e2e8f0; border-bottom-left-radius:5px; }
    .bubble.sys { align-self: center; background: rgba(255,255,255,0.03); color:#64748b; font-size:0.65rem; padding:6px 14px; border-radius:20px; }
    @keyframes pop { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

    .input-row {
      padding: 10px 14px 16px;
      background: rgba(8,12,24,0.8);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-top: 1px solid rgba(255,255,255,0.05);
      display: flex; gap: 10px;
    }
    #msgInput {
      flex:1; background: rgba(20,28,45,0.8);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:28px; padding:14px 18px;
      font-size:0.88rem; color:#fff; outline:none;
    }
    #msgInput:focus { border-color: #3b82f6; box-shadow:0 0 18px rgba(59,130,246,0.25); }
    #sendBtn {
      width:46px; height:46px; border-radius:50%;
      background: linear-gradient(135deg,#2563eb,#7c3aed);
      border:none; color:#fff; font-size:18px; cursor:pointer;
      box-shadow:0 8px 22px rgba(37,99,235,0.5);
    }
    #sendBtn:active { transform:scale(0.9); }
  </style>
</head>
<body>

<div class="app-card">
  <div class="header">
    <div class="logo">
      <div class="logo-icon">🔵</div>
      <div><h2>Bluetooth Chat</h2><span>OFFLINE</span></div>
    </div>
    <div id="statusBadge"><span id="statusDot"></span><span id="statusLabel">Offline</span></div>
  </div>

  <div class="btns">
    <button class="btn" id="pairBtn">📱 Pair</button>
    <button class="btn go" id="connectBtn">🔗 Connect</button>
    <button class="btn" id="discBtn" style="color:#f87171">✖ Leave</button>
  </div>

  <div class="msgs" id="msgBox">
    <div class="bubble sys">✨ Bluetooth Chat Ready</div>
    <div class="bubble sys" id="supportMsg">Checking...</div>
  </div>

  <div class="input-row">
    <input id="msgInput" placeholder="Type message..." autocomplete="off">
    <button id="sendBtn">➤</button>
  </div>
</div>

<script>
const SVC='6e400001-b5a3-f393-e0a9-e50e24dcca9e';
const TX='6e400002-b5a3-f393-e0a9-e50e24dcca9e';
const RX='6e400003-b5a3-f393-e0a9-e50e24dcca9e';

let dev=null, srv=null, tx=null, rx=null, conn=false;

const badge=document.getElementById('statusBadge');
const label=document.getElementById('statusLabel');
const box=document.getElementById('msgBox');
const inp=document.getElementById('msgInput');
const snd=document.getElementById('sendBtn');
const sup=document.getElementById('supportMsg');

if(!navigator.bluetooth){sup.textContent='❌ Use Chrome';pairBtn.disabled=connectBtn.disabled=true;}
else sup.textContent='✅ Ready';

function setConn(v){
  conn=v;
  badge.classList.toggle('on',v);
  label.textContent=v?'Connected':'Offline';
}
function add(t,c){
  const d=document.createElement('div');
  d.className='bubble '+c; d.textContent=t;
  box.appendChild(d); box.scrollTop=box.scrollHeight;
}
function rxH(e){
  const v=e.target.value;
  if(v){const t=new TextDecoder().decode(v); if(t.trim())add(t,'received');}
}
async function dc(){
  try{if(rx){rx.removeEventListener('characteristicvaluechanged',rxH);rx=null;}
  if(srv?.connected)await srv.disconnect();}catch(e){}
  srv=tx=null; dev=null; setConn(false); add('🔌 Disconnected','sys');
}
async function pair(){
  try{
    add('🔍 Searching...','sys');
    dev=await navigator.bluetooth.requestDevice({filters:[{services:[SVC]}],optionalServices:[SVC]});
    add('📱 Paired: '+(dev.name||'Device'),'sys');
  }catch(e){}
}
async function connect(){
  if(!dev){alert('Pair first!');return;}
  try{
    await dc(); add('🔄 Connecting...','sys');
    srv=await dev.gatt.connect();
    const sv=await srv.getPrimaryService(SVC);
    tx=await sv.getCharacteristic(TX);
    rx=await sv.getCharacteristic(RX);
    await rx.startNotifications();
    rx.addEventListener('characteristicvaluechanged',rxH);
    setConn(true); add('✅ Connected!','sys');
    dev.addEventListener('gattserverdisconnected',()=>{add('⚠️ Disconnected','sys');dc();});
  }catch(e){add('❌ Failed: '+e.message,'sys');dc();}
}
async function send(){
  const t=inp.value.trim(); if(!t||!tx||!conn){alert('Connect first!');return;}
  try{await tx.writeValue(new TextEncoder().encode(t));add(t,'sent');inp.value='';}
  catch(e){add('❌ Send failed','sys');}
}
pairBtn.addEventListener('click',pair);
connectBtn.addEventListener('click',connect);
discBtn.addEventListener('click',dc);
snd.addEventListener('click',send);
inp.addEventListener('keydown',e=>{if(e.key==='Enter')send();});
window.addEventListener('beforeunload',()=>{if(srv?.connected)srv.disconnect();});
setConn(false);
</script>
</body>
