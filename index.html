<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AHMAD RDX TOOLKIT</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0f172a;
            --primary: #8b5cf6;
            --secondary: #ec4899;
            --text-light: #f8fafc;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 10% 20%, rgba(139, 92, 246, 0.15) 0%, transparent 40%), radial-gradient(circle at 90% 80%, rgba(236, 72, 153, 0.15) 0%, transparent 40%);
            background-attachment: fixed; color: var(--text-light); min-height: 100vh; overflow-x: hidden;
        }
        #login-section { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-box {
            background: var(--glass-bg); backdrop-filter: blur(15px); border: 1px solid var(--glass-border);
            padding: 40px; border-radius: 20px; width: 90%; max-width: 420px; text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }
        .login-box .logo-icon {
            font-size: 50px;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #8b5cf6, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .login-box h1 { font-size: 1.6rem; margin-bottom: 5px; background: linear-gradient(to right, #a78bfa, #f472b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 700; }
        .login-box .subtitle { color: #64748b; margin-bottom: 30px; font-size: 0.85rem; }
        .input-group { margin-bottom: 18px; text-align: left; position: relative; }
        .input-group label { display: block; color: #94a3b8; font-size: 0.8rem; margin-bottom: 5px; font-weight: 500; }
        .input-group input, .input-group textarea { width: 100%; padding: 12px 40px 12px 15px; background: rgba(0, 0, 0, 0.3); border: 1px solid var(--glass-border); border-radius: 10px; color: white; font-size: 1rem; outline: none; transition: 0.3s; }
        .input-group input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.2); }
        .input-group .icon { position: absolute; right: 12px; bottom: 12px; color: #64748b; }
        .btn { width: 100%; padding: 12px; background: linear-gradient(135deg, var(--primary), var(--secondary)); border: none; border-radius: 10px; color: white; font-weight: 600; font-size: 1.05rem; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(236, 72, 153, 0.3); }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(139, 92, 246, 0.4); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .error-msg { color: #ef4444; font-size: 0.8rem; margin-top: 8px; min-height: 20px; }
        .success-msg { color: #10b981; font-size: 0.8rem; margin-top: 8px; }
        .lock-timer { color: #f59e0b; font-size: 0.8rem; margin-top: 8px; display: none; }
        
        .secret-link { color: #1e293b; font-size: 0.65rem; margin-top: 20px; opacity: 0.4; cursor: default; user-select: none; transition: 0.3s; }
        .secret-link:hover { opacity: 0.8; color: #64748b; }
        
        /* Recovery Modal */
        .recovery-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: 0.3s; }
        .recovery-overlay.active { opacity: 1; visibility: visible; }
        .recovery-box { background: #1e293b; border: 1px solid var(--glass-border); padding: 30px; border-radius: 20px; width: 90%; max-width: 450px; text-align: center; }
        .recovery-box h3 { color: white; margin-bottom: 20px; }
        .recovery-box .hint-text { color: #94a3b8; font-size: 0.85rem; margin-bottom: 20px; line-height: 1.6; }
        .recovery-box .hint-text b { color: #a78bfa; }
        .recovery-box input { width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); border-radius: 10px; color: white; margin-bottom: 15px; text-align: center; font-size: 1.2rem; letter-spacing: 5px; }
        .recovery-box .close-btn { background: none; border: 1px solid rgba(239,68,68,0.3); color: #ef4444; padding: 8px 20px; border-radius: 8px; cursor: pointer; margin-top: 10px; }
        
        #app-section { display: none; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(10px); border-bottom: 1px solid var(--glass-border); position: sticky; top: 0; z-index: 50; }
        .brand h1 { font-size: 1.8rem; font-weight: 700; color: white; letter-spacing: 1px; }
        .brand h1 span { background: linear-gradient(to right, #a78bfa, #f472b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .user-controls { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .badge { background: var(--glass-bg); border: 1px solid var(--glass-border); padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; color: #a78bfa; }
        .logout-btn { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); padding: 8px 15px; border-radius: 8px; cursor: pointer; transition: 0.3s; font-size: 0.85rem; }
        .logout-btn:hover { background: #ef4444; color: white; }
        .container { max-width: 1300px; margin: 40px auto; padding: 0 20px; }
        .tools-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }
        .tool-card { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 20px; padding: 15px; backdrop-filter: blur(12px); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2); transition: 0.4s ease; position: relative; }
        .tool-card:hover { transform: translateY(-8px); border-color: rgba(255, 255, 255, 0.2); box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4); }
        .thumbnail-wrapper { width: 100%; height: 160px; border-radius: 12px; overflow: hidden; position: relative; margin-bottom: 15px; background: var(--card-aura, linear-gradient(135deg, #8b5cf6, #ec4899)); padding: 2px; box-shadow: 0 0 20px var(--card-aura-glow, rgba(139, 92, 246, 0.4)); }
        .thumbnail-inner { width: 100%; height: 100%; background: #ffffff; border-radius: 10px; position: relative; overflow: hidden; }
        .thumbnail-iframe { width: 400%; height: 400%; transform: scale(0.25); transform-origin: top left; border: none; pointer-events: none; }
        .thumbnail-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.05); z-index: 10; }
        .tool-info h3 { font-size: 1.2rem; color: #f8fafc; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .branding-tag { font-size: 0.7rem; color: #94a3b8; letter-spacing: 1px; margin-bottom: 15px; }
        .branding-tag span { color: var(--secondary); font-weight: 600; }
        .actions { display: flex; gap: 10px; }
        .launch-btn { flex-grow: 1; padding: 10px; border: none; border-radius: 8px; background: rgba(255, 255, 255, 0.1); color: white; font-weight: 500; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .launch-btn:hover { background: var(--primary); }
        .delete-btn { padding: 10px 15px; border: none; border-radius: 8px; background: rgba(239, 68, 68, 0.15); color: #ef4444; cursor: pointer; transition: 0.3s; display: none; }
        .delete-btn:hover { background: #ef4444; color: white; }
        .fab-btn { position: fixed; bottom: 40px; right: 40px; width: 65px; height: 65px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; font-size: 24px; border: none; cursor: pointer; box-shadow: 0 10px 25px rgba(236, 72, 153, 0.4); transition: 0.3s; display: none; z-index: 100; }
        .fab-btn:hover { transform: scale(1.1) rotate(90deg); }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(8px); display: flex; justify-content: center; align-items: center; z-index: 1000; opacity: 0; visibility: hidden; transition: 0.3s; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-box { background: #1e293b; border: 1px solid var(--glass-border); padding: 30px; border-radius: 20px; width: 90%; max-width: 600px; transform: translateY(20px); transition: 0.3s; }
        .modal-overlay.active .modal-box { transform: translateY(0); }
        .modal-header { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .modal-header h2 { color: white; }
        .close-modal { background: none; border: none; color: #94a3b8; font-size: 20px; cursor: pointer; }
        .close-modal:hover { color: white; }
        .input-group textarea { height: 150px; font-family: monospace; }
        .loading-spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top: 2px solid white; border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
        @media (max-width: 768px) { header { padding: 15px 20px; flex-direction: column; gap: 10px; } .thumbnail-wrapper { height: 140px; } .user-controls { justify-content: center; } }
    </style>
</head>
<body>

    <!-- Recovery Modal -->
    <div class="recovery-overlay" id="recoveryModal">
        <div class="recovery-box">
            <h3>🔑 Account Recovery</h3>
            <p class="hint-text">
                <b>Secret Question:</b> Hamare brand ka naam kya hai? (Hint: AHMAD ___)
            </p>
            <input type="text" id="recoveryAnswer" placeholder="Answer likho..." autocomplete="off">
            <p style="color:#94a3b8; font-size:0.75rem; margin-bottom:10px;">Sahi jawab dene pe credentials dikhenge</p>
            <button class="btn" onclick="checkRecoveryAnswer()">Verify</button>
            <p class="error-msg" id="recoveryError"></p>
            <p class="success-msg" id="recoverySuccess" style="display:none;"></p>
            <button class="close-btn" onclick="closeRecovery()">Cancel</button>
        </div>
    </div>

    <section id="login-section">
        <div class="login-box">
            <div class="logo-icon">🔐</div>
            <h1>AHMAD RDX TOOLKIT</h1>
            <p class="subtitle">Secure Access Portal</p>
            
            <div class="input-group">
                <label><i class="fa-solid fa-user"></i> Username</label>
                <input type="text" id="username" placeholder="Enter username" autocomplete="off">
            </div>
            <div class="input-group">
                <label><i class="fa-solid fa-lock"></i> Password</label>
                <input type="password" id="password" placeholder="Enter password">
            </div>
            
            <button class="btn" id="loginBtn" onclick="handleLogin()">
                <i class="fa-solid fa-right-to-bracket"></i> Secure Login
            </button>
            
            <div class="error-msg" id="errorMsg"></div>
            <div class="lock-timer" id="lockTimer"></div>
            <div class="success-msg" id="successMsg"></div>
            
            <!-- Hidden recovery trigger - sirf tumeh pata hoga -->
            <div class="secret-link" ondblclick="openRecovery()" title="">•••</div>
        </div>
    </section>

    <section id="app-section">
        <header>
            <div class="brand"><h1>AHMAD <span>RDX</span> TOOLKIT</h1></div>
            <div class="user-controls">
                <span class="badge" id="userRoleBadge">Role</span>
                <span class="badge" id="userNameDisplay" style="background: rgba(139, 92, 246, 0.2); color: #c4b5fd;"></span>
                <button class="logout-btn" onclick="handleLogout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
            </div>
        </header>
        <div class="container">
            <div class="tools-grid" id="toolsGrid">
                <p style="text-align:center; grid-column: 1/-1; color:#94a3b8; margin-top:50px;">
                    <span class="loading-spinner"></span> Loading tools...</p>
            </div>
        </div>
        <button class="fab-btn" id="openModalBtn" title="Add New Tool"><i class="fa-solid fa-plus"></i></button>
        <div class="modal-overlay" id="addToolModal">
            <div class="modal-box">
                <div class="modal-header"><h2>Add New Tool</h2><button class="close-modal" id="closeModalBtn"><i class="fa-solid fa-xmark"></i></button></div>
                <div class="input-group"><input type="text" id="toolName" placeholder="Tool Name"></div>
                <div class="input-group"><textarea id="toolCode" placeholder="Paste HTML code here..."></textarea></div>
                <button class="btn" id="saveToolBtn"><i class="fa-solid fa-save"></i> Save Tool</button>
            </div>
        </div>
    </section>

    <script>
        // =============================================
        // 🔐 SECURE CONFIG - CHANGE THESE AS NEEDED
        // =============================================
        
        // Secret recovery answer (case-insensitive)
        const RECOVERY_ANSWER = "rdx";
        
        // Max login attempts before lock
        const MAX_ATTEMPTS = 5;
        const LOCK_TIME = 300; // 5 minutes in seconds
        
        // =============================================
        // 🔐 AUTHENTICATION SYSTEM
        // =============================================
        
        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        const VALID_CREDENTIALS = {
            admin: { username: 'ahmadrdx', passwordHash: '', role: 'admin', displayName: 'Ahmad RDX' },
            user: { username: 'ahmiirdx', passwordHash: '', role: 'user', displayName: 'Ahmiir DX' }
        };

        (async function initAuth() {
            VALID_CREDENTIALS.admin.passwordHash = await sha256('ahmad123');
            VALID_CREDENTIALS.user.passwordHash = await sha256('ahmad786');
        })();

        let myTools = [];
        let currentUserRole = null;
        let currentUsername = null;
        let loginAttempts = 0;
        let lockUntil = null;

        const STORAGE_KEY = 'ahmad_rdx_toolkit_db';
        const auraColors = [
            { bg: 'linear-gradient(135deg, #8b5cf6, #ec4899)', glow: 'rgba(236, 72, 153, 0.4)' },
            { bg: 'linear-gradient(135deg, #3b82f6, #2dd4bf)', glow: 'rgba(45, 212, 191, 0.4)' },
            { bg: 'linear-gradient(135deg, #f59e0b, #ef4444)', glow: 'rgba(239, 68, 68, 0.4)' },
            { bg: 'linear-gradient(135deg, #10b981, #3b82f6)', glow: 'rgba(16, 185, 129, 0.4)' }
        ];

        // =============================================
        // 🔒 BRUTE FORCE PROTECTION
        // =============================================
        
        function isLocked() {
            if (!lockUntil) return false;
            if (Date.now() > lockUntil) {
                lockUntil = null;
                loginAttempts = 0;
                document.getElementById('lockTimer').style.display = 'none';
                return false;
            }
            return true;
        }

        function updateLockTimer() {
            if (!lockUntil) return;
            const remaining = Math.ceil((lockUntil - Date.now()) / 1000);
            if (remaining <= 0) {
                lockUntil = null;
                loginAttempts = 0;
                document.getElementById('lockTimer').style.display = 'none';
                document.getElementById('errorMsg').textContent = '';
                document.getElementById('loginBtn').disabled = false;
                return;
            }
            const mins = Math.floor(remaining / 60);
            const secs = remaining % 60;
            document.getElementById('lockTimer').textContent = `🔒 Too many attempts! Wait ${mins}m ${secs}s`;
            document.getElementById('lockTimer').style.display = 'block';
            setTimeout(updateLockTimer, 1000);
        }

        // =============================================
        // 🔑 RECOVERY SYSTEM (Hidden)
        // =============================================
        
        function openRecovery() {
            document.getElementById('recoveryModal').classList.add('active');
            document.getElementById('recoveryError').textContent = '';
            document.getElementById('recoverySuccess').style.display = 'none';
            document.getElementById('recoveryAnswer').value = '';
        }

        function closeRecovery() {
            document.getElementById('recoveryModal').classList.remove('active');
        }

        function checkRecoveryAnswer() {
            const answer = document.getElementById('recoveryAnswer').value.trim().toLowerCase();
            const errorEl = document.getElementById('recoveryError');
            const successEl = document.getElementById('recoverySuccess');
            
            if (answer === RECOVERY_ANSWER) {
                errorEl.textContent = '';
                successEl.style.display = 'block';
                successEl.innerHTML = `
                    ✅ <b>Admin:</b> ahmadrdx / ahmad123<br>
                    ✅ <b>User:</b> ahmiirdx / ahmad786<br>
                    <small>Is info ko kisi aur ko mat batana!</small>
                `;
                // Reset lock
                loginAttempts = 0;
                lockUntil = null;
                document.getElementById('lockTimer').style.display = 'none';
                document.getElementById('loginBtn').disabled = false;
            } else {
                successEl.style.display = 'none';
                errorEl.textContent = '❌ Galat jawab! Try again.';
            }
        }

        // =============================================
        // 🔐 LOGIN SYSTEM
        // =============================================
        
        async function handleLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorMsg = document.getElementById('errorMsg');
            const loginBtn = document.getElementById('loginBtn');

            // Check lock
            if (isLocked()) {
                errorMsg.textContent = '🔒 Account locked! Use recovery below.';
                updateLockTimer();
                return;
            }

            if (!username || !password) {
                errorMsg.textContent = '❌ Username aur password dono bharo!';
                return;
            }

            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="loading-spinner"></span> Verifying...';

            const passwordHash = await sha256(passwword);
            let authenticated = false;
            let userRole = null;
            let displayName = '';

            for (let [key, cred] of Object.entries(VALID_CREDENTIALS)) {
                if (cred.username === username && cred.passwordHash === passwordHash) {
                    authenticated = true;
                    userRole = cred.role;
                    displayName = cred.displayName;
                    break;
                }
            }

            if (authenticated) {
                // Reset attempts on success
                loginAttempts = 0;
                lockUntil = null;
                document.getElementById('lockTimer').style.display = 'none';
                
                loadLocalData();
                currentUserRole = userRole;
                currentUsername = username;
                errorMsg.textContent = '';
                
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('app-section').style.display = 'block';
                document.getElementById('userRoleBadge').innerText = userRole === 'admin' ? '🛡️ Admin' : '👤 User';
                document.getElementById('userNameDisplay').innerText = '👋 ' + displayName;
                document.getElementById('openModalBtn').style.display = userRole === 'admin' ? 'flex' : 'none';
                
                document.getElementById('username').value = '';
                document.getElementById('password').value = '';
                
                renderTools();
            } else {
                // Increment failed attempts
                loginAttempts++;
                const remaining = MAX_ATTEMPTS - loginAttempts;
                
                if (loginAttempts >= MAX_ATTEMPTS) {
                    lockUntil = Date.now() + (LOCK_TIME * 1000);
                    errorMsg.textContent = '🔒 Too many failed attempts! Locked for 5 minutes.';
                    updateLockTimer();
                    document.getElementById('loginBtn').disabled = true;
                } else {
                    errorMsg.textContent = `❌ Invalid credentials! ${remaining} attempts remaining.`;
                    document.querySelector('.login-box').style.animation = 'shake 0.5s';
                    setTimeout(() => { document.querySelector('.login-box').style.animation = ''; }, 500);
                }
            }
            
            if (!isLocked()) {
                loginBtn.disabled = false;
            }
            loginBtn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> Secure Login';
        }

        function handleLogout() {
            currentUserRole = null;
            currentUsername = null;
            document.getElementById('login-section').style.display = 'flex';
            document.getElementById('app-section').style.display = 'none';
            document.getElementById('errorMsg').textContent = '';
            document.getElementById('lockTimer').style.display = 'none';
        }

        // Enter key support
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && document.getElementById('login-section').style.display !== 'none') {
                handleLogin();
            }
        });

        // =============================================
        // 💾 LOCAL STORAGE (Syncs via shared localStorage)
        // =============================================
        
        function loadLocalData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            myTools = saved ? JSON.parse(saved) : [];
        }

        function saveLocalData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(myTools));
        }

        // =============================================
        // 🛠️ TOOL MANAGEMENT
        // =============================================
        
        const modal = document.getElementById('addToolModal');
        document.getElementById('openModalBtn').addEventListener('click', () => modal.classList.add('active'));
        document.getElementById('closeModalBtn').addEventListener('click', () => modal.classList.remove('active'));
        
        document.getElementById('saveToolBtn').addEventListener('click', () => {
            const name = document.getElementById('toolName').value.trim();
            const code = document.getElementById('toolCode').value.trim();
            
            if (!name || !code) return alert("Please fill all fields!");

            const randomAura = auraColors[Math.floor(Math.random() * auraColors.length)];
            
            myTools.push({
                id: Date.now(),
                name: name,
                code: code,
                aura: randomAura,
                addedBy: currentUsername,
                addedAt: new Date().toISOString()
            });

            saveLocalData();
            renderTools();
            
            modal.classList.remove('active');
            document.getElementById('toolName').value = '';
            document.getElementById('toolCode').value = '';
        });

        function deleteTool(id) {
            if(confirm("Delete this tool?")) {
                myTools = myTools.filter(t => t.id !== id);
                saveLocalData();
                renderTools();
            }
        }

        function launchTool(id) {
            const tool = myTools.find(t => t.id === id);
            if(tool) {
                const newWindow = window.open("", "_blank");
                newWindow.document.open();
                newWindow.document.write(`<!DOCTYPE html><html><head><title>${tool.name} | AHMAD RDX</title></head><body>${tool.code}</body></html>`);
                newWindow.document.close();
            }
        }

        function renderTools() {
            const grid = document.getElementById('toolsGrid');
            grid.innerHTML = '';

            if (myTools.length === 0) {
                grid.innerHTML = `<p style="text-align:center; grid-column: 1/-1; color:#94a3b8; margin-top:50px;">
                    📦 No tools yet. Admin can add tools.</p>`;
                return;
            }

            myTools.forEach(tool => {
                const card = document.createElement('div');
                card.className = 'tool-card';
                card.style.setProperty('--card-aura', tool.aura.bg);
                card.style.setProperty('--card-aura-glow', tool.aura.glow);
                
                const deleteBtnDisplay = currentUserRole === 'admin' ? 'block' : 'none';

                card.innerHTML = `
                    <div class="thumbnail-wrapper">
                        <div class="thumbnail-inner">
                            <iframe class="thumbnail-iframe" srcdoc="${escapeHTML(tool.code)}" sandbox="allow-scripts"></iframe>
                            <div class="thumbnail-overlay"></div>
                        </div>
                    </div>
                    <div class="tool-info">
                        <h3>${escapeHTML(tool.name)}</h3>
                        <div class="branding-tag">BY <span>AHMAD RDX</span> ${tool.addedBy ? '• ' + tool.addedBy : ''}</div>
                        <div class="actions">
                            <button class="launch-btn" onclick="launchTool(${tool.id})">
                                <i class="fa-solid fa-rocket"></i> Launch
                            </button>
                            <button class="delete-btn" style="display: ${deleteBtnDisplay};" onclick="deleteTool(${tool.id})">
                                <i class="fa-solid fa-trash"></i>
                            </button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function escapeHTML(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        // Initial load
        loadLocalData();
    </script>
</body>
</html>
