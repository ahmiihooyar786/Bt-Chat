<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Tools Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0b0f19;
            --primary: #6366f1;
            --secondary: #ec4899;
            --text-light: #f8fafc;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(99, 102, 241, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(236, 72, 153, 0.15), transparent 25%);
            background-attachment: fixed;
            color: var(--text-light);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Header */
        header {
            text-align: center;
            padding: 50px 20px 30px;
            position: relative;
            z-index: 10;
        }

        header h1 {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(to right, #818cf8, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        header p {
            color: #94a3b8;
            font-size: 1.1rem;
            font-weight: 300;
        }

        /* Container & Grid */
        .container {
            max-width: 1200px;
            margin: 0 auto 60px;
            padding: 0 20px;
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            margin-top: 20px;
        }

        /* App Cards */
        .tool-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 25px;
            backdrop-filter: blur(16px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .tool-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 4px;
            background: var(--card-gradient, linear-gradient(to right, #6366f1, #ec4899));
        }

        .tool-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .tool-icon-wrapper {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 35px;
            color: white;
            margin-bottom: 20px;
            background: var(--card-gradient, linear-gradient(135deg, #6366f1, #ec4899));
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .tool-card h3 {
            font-size: 1.3rem;
            font-weight: 600;
            color: #f1f5f9;
            margin-bottom: 25px;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-actions {
            display: flex;
            width: 100%;
            gap: 10px;
        }

        .launch-btn {
            flex-grow: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .launch-btn:hover {
            background: white;
            color: #0f172a;
        }

        .delete-btn {
            padding: 12px 15px;
            border: none;
            border-radius: 12px;
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            cursor: pointer;
            transition: 0.3s;
        }

        .delete-btn:hover {
            background: #ef4444;
            color: white;
        }

        /* Floating Action Button */
        .fab-btn {
            position: fixed;
            bottom: 40px;
            right: 40px;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #ec4899);
            color: white;
            font-size: 24px;
            border: none;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(236, 72, 153, 0.4);
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .fab-btn:hover {
            transform: scale(1.1) rotate(90deg);
        }

        /* Modal / Popup */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 15, 25, 0.85);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-box {
            background: #1e293b;
            border: 1px solid var(--glass-border);
            padding: 40px;
            border-radius: 24px;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            transform: scale(0.9);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-overlay.active .modal-box {
            transform: scale(1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .modal-header h2 {
            font-weight: 600;
            color: white;
        }

        .close-modal {
            background: rgba(255, 255, 255, 0.1);
            color: #cbd5e1;
            border: none;
            width: 35px; height: 35px;
            border-radius: 50%;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }

        .close-modal:hover {
            background: #ef4444;
            color: white;
        }

        .input-group { margin-bottom: 20px; }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .input-group input, .input-group textarea {
            width: 100%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid #334155;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus, .input-group textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        .input-group textarea {
            height: 180px;
            resize: vertical;
            font-family: monospace;
        }

        .save-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #6366f1, #ec4899);
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .save-btn:hover {
            box-shadow: 0 10px 20px rgba(236, 72, 153, 0.3);
            transform: translateY(-2px);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            grid-column: 1 / -1;
            padding: 80px 20px;
        }
        .empty-state img {
            width: 150px;
            opacity: 0.5;
            margin-bottom: 20px;
            filter: grayscale(100%) brightness(200%);
        }
        .empty-state h2 { color: #94a3b8; font-weight: 500;}
        .empty-state p { color: #64748b; margin-top: 10px;}

    </style>
</head>
<body>

    <header>
        <h1>ToolBox Pro</h1>
        <p>Your Personal Hub for Custom Web Tools</p>
    </header>

    <div class="container">
        <div class="tools-grid" id="toolsGrid">
            </div>
    </div>

    <button class="fab-btn" id="openModalBtn">
        <i class="fa-solid fa-plus"></i>
    </button>

    <div class="modal-overlay" id="addToolModal">
        <div class="modal-box">
            <div class="modal-header">
                <h2>Add New Tool</h2>
                <button class="close-modal" id="closeModalBtn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            
            <div class="input-group">
                <label for="toolName">Tool Name</label>
                <input type="text" id="toolName" placeholder="e.g. Chat Editor, Background Remover..." autocomplete="off">
            </div>

            <div class="input-group">
                <label for="toolCode">HTML/CSS/JS Source Code</label>
                <textarea id="toolCode" placeholder="Paste your complete tool code here..."></textarea>
            </div>

            <button class="save-btn" id="saveToolBtn">Create App Card</button>
        </div>
    </div>

    <script>
        // Array to store tools
        let myTools = JSON.parse(localStorage.getItem('premiumToolsPro')) || [];

        // Cool gradients for random App Card colors
        const gradients = [
            'linear-gradient(135deg, #6366f1, #a855f7)',
            'linear-gradient(135deg, #ec4899, #f43f5e)',
            'linear-gradient(135deg, #14b8a6, #0ea5e9)',
            'linear-gradient(135deg, #f59e0b, #ef4444)',
            'linear-gradient(135deg, #8b5cf6, #d946ef)'
        ];

        // Icons for tools
        const icons = [
            'fa-solid fa-wand-magic-sparkles',
            'fa-solid fa-code',
            'fa-solid fa-laptop-code',
            'fa-solid fa-microchip',
            'fa-solid fa-gear',
            'fa-solid fa-layer-group'
        ];

        // DOM Elements
        const toolsGrid = document.getElementById('toolsGrid');
        const modal = document.getElementById('addToolModal');
        const openBtn = document.getElementById('openModalBtn');
        const closeBtn = document.getElementById('closeModalBtn');
        const saveBtn = document.getElementById('saveToolBtn');
        const toolNameInput = document.getElementById('toolName');
        const toolCodeInput = document.getElementById('toolCode');

        // Modal Controls
        openBtn.addEventListener('click', () => {
            modal.classList.add('active');
            toolNameInput.focus();
        });

        closeBtn.addEventListener('click', closeModal);
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });

        function closeModal() {
            modal.classList.remove('active');
            toolNameInput.value = '';
            toolCodeInput.value = '';
        }

        // Save New Tool
        saveBtn.addEventListener('click', () => {
            const name = toolNameInput.value.trim();
            const code = toolCodeInput.value.trim();

            if (!name || !code) {
                alert("Please fill in both fields!");
                return;
            }

            const newTool = {
                id: Date.now(),
                name: name,
                code: code,
                gradient: gradients[Math.floor(Math.random() * gradients.length)],
                icon: icons[Math.floor(Math.random() * icons.length)]
            };

            myTools.push(newTool);
            saveToLocalStorage();
            renderTools();
            closeModal();
        });

        // Delete Tool
        function deleteTool(id) {
            if(confirm("Are you sure you want to delete this tool?")) {
                myTools = myTools.filter(tool => tool.id !== id);
                saveToLocalStorage();
                renderTools();
            }
        }

        // MAGIC: Launch Tool in a New Page / Tab
        function launchTool(id) {
            const tool = myTools.find(t => t.id === id);
            if(tool) {
                // Open a blank new tab
                const newWindow = window.open("", "_blank");
                // Write the tool's HTML code inside that new tab
                newWindow.document.open();
                newWindow.document.write(tool.code);
                newWindow.document.close();
            }
        }

        function saveToLocalStorage() {
            localStorage.setItem('premiumToolsPro', JSON.stringify(myTools));
        }

        // Render UI
        function renderTools() {
            toolsGrid.innerHTML = ''; 

            if (myTools.length === 0) {
                toolsGrid.innerHTML = `
                    <div class="empty-state">
                        <i class="fa-solid fa-folder-open" style="font-size: 80px; color: #475569; margin-bottom: 20px;"></i>
                        <h2>No Tools Added Yet</h2>
                        <p>Click the + button below to create your first app card.</p>
                    </div>
                `;
                return;
            }

            myTools.forEach(tool => {
                const card = document.createElement('div');
                card.className = 'tool-card';
                // Apply the random gradient saved to this tool
                card.style.setProperty('--card-gradient', tool.gradient);

                card.innerHTML = `
                    <div class="tool-icon-wrapper">
                        <i class="${tool.icon || 'fa-solid fa-code'}"></i>
                    </div>
                    <h3>${tool.name}</h3>
                    <div class="card-actions">
                        <button class="launch-btn" onclick="launchTool(${tool.id})">
                            <i class="fa-solid fa-arrow-up-right-from-square"></i> Launch
                        </button>
                        <button class="delete-btn" onclick="deleteTool(${tool.id})" title="Delete">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </div>
                `;
                toolsGrid.appendChild(card);
            });
        }

        // Initialize
        renderTools();
    </script>
</body>
</html>
