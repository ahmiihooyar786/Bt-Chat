<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  
  <meta name="theme-color" content="#0a0e17">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="BT Chat">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="description" content="Offline Bluetooth Chat - No Internet Required">
  
  <!-- Manifest (external file) -->
  <link rel="manifest" href="manifest.json">
  
  <title>Bluetooth Chat Pro</title>

  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:'Segoe UI',system-ui,sans-serif;
      background:radial-gradient(ellipse at 30% 30%,#0f172a,#020617);
      min-height:100vh;display:flex;align-items:center;justify-content:center;padding:10px;
    }
    .app{
      width:100%;max-width:430px;height:94vh;
      background:rgba(15,23,42,.75);backdrop-filter:blur(48px);-webkit-backdrop-filter:blur(48px);
      border-radius:36px;border:1.5px solid rgba(255,255,255,.08);
      box-shadow:0 40px 80px rgba(0,0,0,.6);display:flex;flex-direction:column;overflow:hidden;
    }
    .hdr{
      padding:20px;background:rgba(8,12,24,.5);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
      border-bottom:1px solid rgba(255,255,255,.05);display:flex;justify-content:space-between;align-items:center;
    }
    .logo{display:flex;align-items:center;gap:10px}
    .logo-i{width:42px;height:42px;background:linear-gradient(135deg,#2563eb,#06b6d4);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px}
    .logo h2{font-size:1rem;font-weight:700;color:#e0f2fe}
    .logo span{font-size:.6rem;color:#64748b;display:block}
    #sb{padding:7px 15px;border-radius:30px;font-size:.68rem;font-weight:700;display:flex;align-items:center;gap:7px;background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.4);color:#f87171}
    #sb.on{background:rgba(16,185,129,.15);border-color:rgba(16,185,129,.5);color:#6ee7b7}
    #sd{width:8px;height:8px;border-radius:50%;background:#ef4444;animation:pulse 1.8s infinite}
    #sb.on #sd{background:#10b981;box-shadow:0 0 14px #10b981}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
    .btns{display:flex;padding:12px 16px;gap:8px}
    .btn{flex:1;padding:13px 6px;border-radius:26px;font-size:.72rem;font-weight:700;border:1px solid rgba(255,255,255,.1);cursor:pointer;background:rgba(20,28,45,.65);color:#cbd5e1;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:center;gap:5px}
    .btn:active{transform:scale(.95)}
    .btn.go{background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;border:1px solid rgba(255,255,255,.25);box-shadow:0 8px 22px rgba(37,99,235,.45)}
    .msgs{flex:1;overflow-y:auto;padding:14px 12px;display:flex;flex-direction:column;gap:10px}
    .bub{max-width:82%;padding:10px 15px;border-radius:20px;font-size:.85rem;line-height:1.45;word-break:break-word;animation:pop .25s ease;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);box-shadow:0 4px 10px rgba(0,0,0,.25)}
    .bub.sent{align-self:flex-end;background:linear-gradient(135deg,#2563eb,#4f46e5);color:#fff;border-bottom-right-radius:5px}
    .bub.recv{align-self:flex-start;background:rgba(25,30,48,.9);color:#e2e8f0;border-bottom-left-radius:5px}
    .bub.sys{align-self:center;background:rgba(255,255,255,.03);color:#64748b;font-size:.65rem;padding:6px 14px;border-radius:20px}
    @keyframes pop{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .inp-r{padding:10px 14px 16px;background:rgba(8,12,24,.8);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-top:1px solid rgba(255,255,255,.05);display:flex;gap:10px}
    #mi{flex:1;background:rgba(20,28,45,.8);border:1px solid rgba(255,255,255,.1);border-radius:28px;padding:14px 18px;font-size:.88rem;color:#fff;outline:none}
    #mi:focus{border-color:#3b82f6;box-shadow:0 0 18px rgba(59,130,246,.25)}
    #sn{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,#2563eb,#7c3aed);border:none;color:#fff;font-size:18px;cursor:pointer;box-shadow:0 8px 22px rgba(37,99,235,.5)}
    #sn:active{transform:scale(.9)}
  </style>
</head>
<body>

<div class="app">
  <div class="hdr">
    <div class="logo">
      <div class="logo-i">🔵</div>
      <div><h2>Bluetooth Chat</h2><span>OFFLINE</span></div>
    </div>
    <div id="sb"><span id="sd"></span><span id="sl">Offline</span></div>
  </div>

  <div class="btns">
    <button class="btn" id="pb">📱 Pair</button>
    <button class="btn go" id="cb">🔗 Connect</button>
    <button class="btn" id="db" style="color:#f87171">✖ Leave</button>
  </div>

  <div class="msgs" id="mb">
    <div class="bub sys">✨ Bluetooth Chat Pro</div>
    <div class="bub sys" id="sm">Checking...</div>
  </div>

  <div class="inp-r">
    <input id="mi" placeholder="Type message..." autocomplete="off">
    <button id="sn">➤</button>
  </div>
</div>

<script>
// Register Service Worker from external file
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js')
    .then(() => console.log('SW registered'));
}

// ========== BLUETOOTH CHAT ENGINE ==========
const S='6e400001-b5a3-f393-e0a9-e50e24dcca9e';
const TX='6e400002-b5a3-f393-e0a9-e50e24dcca9e';
const RX='6e400003-b5a3-f393-e0a9-e50e24dcca9e';

let d=null,v=null,t=null,r=null,co=false;
const sb=document.getElementById('sb'),sl=document.getElementById('sl');
const mb=document.getElementById('mb'),mi=document.getElementById('mi');
const sm=document.getElementById('sm');

if(!navigator.bluetooth){sm.textContent='❌ Use Chrome';pb.disabled=cb.disabled=true}
else sm.textContent='✅ Ready — Pair & Connect';

function sc(c){co=c;sb.classList.toggle('on',c);sl.textContent=c?'Connected':'Offline'}
function ad(tx,c){const e=document.createElement('div');e.className='bub '+c;e.textContent=tx;mb.appendChild(e);mb.scrollTop=mb.scrollHeight}
function rh(e){const v=e.target.value;if(v){const t=new TextDecoder().decode(v);if(t.trim())ad(t,'recv')}}
async function dc(){
  try{if(r){r.removeEventListener('characteristicvaluechanged',rh);r=null}if(v?.connected)await v.disconnect()}catch(e){}
  v=t=null;d=null;sc(false);ad('🔌 Disconnected','sys')
}
async function pair(){
  try{ad('🔍 Searching...','sys');d=await navigator.bluetooth.requestDevice({filters:[{services:[S]}],optionalServices:[S]});ad('📱 Paired: '+(d.name||'Device'),'sys')}catch(e){}
}
async function connect(){
  if(!d){alert('Pair first!');return}
  try{
    await dc();ad('🔄 Connecting...','sys');
    v=await d.gatt.connect();const sv=await v.getPrimaryService(S);
    t=await sv.getCharacteristic(TX);r=await sv.getCharacteristic(RX);
    await r.startNotifications();r.addEventListener('characteristicvaluechanged',rh);
    sc(true);ad('✅ Connected!','sys');
    d.addEventListener('gattserverdisconnected',()=>{ad('⚠️ Disconnected','sys');dc()})
  }catch(e){ad('❌ Failed: '+e.message,'sys');dc()}
}
async function sd(){
  const tx=mi.value.trim();if(!tx||!t||!co){alert('Connect first!');return}
  try{await t.writeValue(new TextEncoder().encode(tx));ad(tx,'sent');mi.value=''}catch(e){ad('❌ Send failed','sys')}
}
pb.addEventListener('click',pair);cb.addEventListener('click',connect);db.addEventListener('click',dc);
sn.addEventListener('click',sd);mi.addEventListener('keydown',e=>{if(e.key==='Enter')sd()});
window.addEventListener('beforeunload',()=>{if(v?.connected)v.disconnect()});
sc(false);
</script>
</body>
</html>
