<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AHMD RDX | Professional Toolkit</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-body: #050509;
            --bg-card: #0d0d14;
            --bg-input: #14141f;
            --text-main: #f4f4f7;
            --text-muted: #808099;
            --accent: #3b82f6; /* Professional Blue */
            --accent-glow: rgba(59, 130, 246, 0.3);
            --border: rgba(255, 255, 255, 0.06);
            --font-family: 'Inter', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-family);
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            letter-spacing: -0.02em;
        }

        /* Subtle Grid Background Pattern */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
            opacity: 0.3;
        }

        /* Header & Branding */
        header {
            padding: 40px 20px;
            border-bottom: 1px solid var(--border);
            background: rgba(5, 5, 9, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand-area {
            display: flex;
            flex-direction: column;
        }

        .brand-main {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-main);
            letter-spacing: -0.05em;
        }

        .brand-main span {
            color: var(--accent);
        }

        .brand-sub {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 2px;
            text-transform: uppercase;
            letter-spacing: 0.15em;
        }

        .top-stats {
            font-size: 0.9rem;
            color: var(--text-muted);
            background: var(--bg-card);
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid var(--border);
        }

        /* Main Container */
        .container {
            max-width: 1300px;
            margin: 50px auto 100px;
            padding: 0 20px;
        }

        /* Professional Tools Grid */
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        /* Tool Card - Ultra Pro Design */
        .tool-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 25px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 280px;
        }

        .tool-card:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px -10px var(--accent-glow);
        }

        /* The Dynamic Logo based on Tool Name */
        .tool-logo {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 20px;
            transition: 0.3s ease;
        }

        .tool-card:hover .tool-logo {
            background: var(--accent);
            color: #white;
            border-color: var(--accent);
        }

        .tool-meta h3 {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Card Branding AHMD RDX */
        .card-branding {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 20px;
        }

        /* Card Action Buttons */
        .card-actions {
            display: flex;
            gap: 10px;
            border-top: 1px solid var(--border);
            padding-top: 15px;
            margin-top: auto;
        }

        .launch-btn {
            flex-grow: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: var(--accent);
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .launch-btn:hover {
            background: #2563eb; /* Darker Blue */
        }

        .delete-btn {
            padding: 12px 15px;
            border: none;
            border-radius: 8px;
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .delete-btn:hover {
            background: #ef4444;
            color: white;
        }

        /* Floating Action Button (FAB) */
        .fab-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--accent);
            color: white;
            font-size: 20px;
            border: none;
            cursor: pointer;
            box-shadow: 0 10px 20px var(--accent-glow);
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .fab-btn:hover {
            transform: scale(1.1) rotate(90deg);
            background: #2563eb;
        }

        /* Modal / Popup - Pro Style */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 40px;
            border-radius: 20px;
            width: 90%;
            max-width: 650px;
            transform: translateY(20px);
            transition: 0.3s ease;
        }

        .modal-overlay.active .modal-box {
            transform: translateY(0);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .modal-header h2 {
            font-weight: 800;
            font-size: 1.5rem;
            letter-spacing: -0.04em;
        }

        .close-modal {
            background: var(--bg-input);
            color: var(--text-muted);
            border: 1px solid var(--border);
            width: 35px; height: 35px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        .close-modal:hover {
            background: #ef4444;
            color: white;
            border-color: #ef4444;
        }

        .input-group { margin-bottom: 20px; }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .input-group input, .input-group textarea {
            width: 100%;
            padding: 15px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
        }

        .input-group input:focus, .input-group textarea:focus {
            border-color: var(--accent);
        }

        .input-group textarea {
            height: 200px;
            resize: vertical;
            font-family: 'Courier New', monospace; /* Code font */
            font-size: 0.9rem;
        }

        .save-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 8px;
            background: var(--accent);
            color: white;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .save-btn:hover {
            background: #2563eb;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            grid-column: 1 / -1;
            padding: 100px 20px;
            border: 2px dashed var(--border);
            border-radius: 16px;
            background: var(--bg-card);
        }
        .empty-state i {
            font-size: 50px;
            color: var(--accent);
            margin-bottom: 20px;
            opacity: 0.8;
        }
        .empty-state h2 { color: var(--text-main); font-weight: 600;}
        .empty-state p { color: var(--text-muted); margin-top: 10px; font-weight: 300;}

        /* Responsive Improvements */
        @media (max-width: 600px) {
            header { flex-direction: column; gap: 15px; text-align: center; }
            .modal-box { padding: 25px; }
        }

    </style>
</head>
<body>

    <header>
        <div class="brand-area">
            <div class="brand-main">AHMD<span>RDX</span></div>
            <div class="brand-sub">Professional Toolkit</div>
        </div>
        <div class="top-stats" id="toolCount">0 Tools Active</div>
    </header>

    <div class="container">
        <div class="tools-grid" id="toolsGrid">
            </div>
    </div>

    <button class="fab-btn" id="openModalBtn" title="Add New Tool">
        <i class="fa-solid fa-plus"></i>
    </button>

    <div class="modal-overlay" id="addToolModal">
        <div class="modal-box">
            <div class="modal-header">
                <h2>Initialize New Tool</h2>
                <button class="close-modal" id="closeModalBtn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            
            <div class="input-group">
                <label for="toolName">Tool Registry Name</label>
                <input type="text" id="toolName" placeholder="e.g., Json Formatter" autocomplete="off">
            </div>

            <div class="input-group">
                <label for="toolCode">Source Code (HTML/CSS/JS)</label>
                <textarea id="toolCode" placeholder="Paste complete standalone code here..."></textarea>
            </div>

            <button class="save-btn" id="saveToolBtn">Deploy Tool</button>
        </div>
    </div>

    <script>
        // Storage Key
        const STORAGE_KEY = 'ahmd_rdx_pro_toolkit';

        // Array to store tools
        let myTools = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

        // DOM Elements
        const toolsGrid = document.getElementById('toolsGrid');
        const modal = document.getElementById('addToolModal');
        const openBtn = document.getElementById('openModalBtn');
        const closeBtn = document.getElementById('closeModalBtn');
        const saveBtn = document.getElementById('saveToolBtn');
        const toolNameInput = document.getElementById('toolName');
        const toolCodeInput = document.getElementById('toolCode');
        const toolCountSpan = document.getElementById('toolCount');

        // Modal Controls
        openBtn.addEventListener('click', () => {
            modal.classList.add('active');
            toolNameInput.focus();
        });

        closeBtn.addEventListener('click', closeModal);
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });

        function closeModal() {
            modal.classList.remove('active');
            toolNameInput.value = '';
            toolCodeInput.value = '';
        }

        // Helper: Generate Initials from Name (e.g., "Json Formatter" -> "JF")
        function getInitials(name) {
            const words = name.trim().split(' ');
            if (words.length === 1) {
                return words[0].substring(0, 2).toUpperCase();
            }
            return (words[0][0] + words[1][0]).toUpperCase();
        }

        // Save New Tool
        saveBtn.addEventListener('click', () => {
            const name = toolNameInput.value.trim();
            const code = toolCodeInput.value.trim();

            if (!name || !code) {
                alert("Error: Name and Code are required for deployment.");
                return;
            }

            const newTool = {
                id: Date.now(),
                name: name,
                code: code,
                initials: getInitials(name)
            };

            myTools.push(newTool);
            saveToLocalStorage();
            renderTools();
            closeModal();
        });

        // Delete Tool
        function deleteTool(id) {
            if(confirm("Confirm: Are you sure you want to decommission this tool?")) {
                myTools = myTools.filter(tool => tool.id !== id);
                saveToLocalStorage();
                renderTools();
            }
        }

        // Launch Tool in a New Page
        function launchTool(id) {
            const tool = myTools.find(t => t.id === id);
            if(tool) {
                const newWindow = window.open("", "_blank");
                newWindow.document.open();
                // Add a basic title to the new tab
                newWindow.document.write(`<html><head><title>${tool.name} | AHMD RDX</title></head><body>${tool.code}</body></html>`);
                newWindow.document.close();
            }
        }

        function saveToLocalStorage() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(myTools));
        }

        // Render UI
        function renderTools() {
            toolsGrid.innerHTML = ''; 
            toolCountSpan.innerText = `${myTools.length} Tools Active`;

            if (myTools.length === 0) {
                toolsGrid.innerHTML = `
                    <div class="empty-state">
                        <i class="fa-solid fa-microchip"></i>
                        <h2>Toolkit Empty</h2>
                        <p>No professional tools registered. Click the '+' button to deploy your first tool.</p>
                    </div>
                `;
                return;
            }

            myTools.forEach(tool => {
                const card = document.createElement('div');
                card.className = 'tool-card';

                card.innerHTML = `
                    <div class="tool-meta">
                        <div class="tool-logo">${tool.initials}</div>
                        <h3>${tool.name}</h3>
                        <div class="card-branding">AHMD RDX PREMIUM</div>
                    </div>
                    <div class="card-actions">
                        <button class="launch-btn" onclick="launchTool(${tool.id})">
                            <i class="fa-solid fa-terminal"></i> Launch Tool
                        </button>
                        <button class="delete-btn" onclick="deleteTool(${tool.id})" title="Delete">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>
                    </div>
                `;
                toolsGrid.appendChild(card);
            });
        }

        // Initialize
        renderTools();
    </script>
</body>
</html>
