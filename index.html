<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AHMAD RDX TOOLKIT | Global Free</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #030712;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --accent: #8b5cf6;
            --secondary: #ec4899;
        }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            background-image: radial-gradient(circle at 20% 20%, #1e1b4b 0%, transparent 40%),
                              radial-gradient(circle at 80% 80%, #312e81 0%, transparent 40%);
            background-attachment: fixed;
            min-height: 100vh;
        }

        /* --- LOGIN PAGE --- */
        #login-screen {
            height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .login-card {
            background: var(--glass); backdrop-filter: blur(20px);
            padding: 40px; border-radius: 30px; border: 1px solid var(--border);
            width: 350px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        .login-card h2 { font-size: 1.5rem; margin-bottom: 25px; letter-spacing: 1px; }
        .login-card h2 span { color: var(--accent); }
        .input-group { margin-bottom: 15px; }
        .input-group input {
            width: 100%; padding: 12px; background: rgba(0,0,0,0.4);
            border: 1px solid var(--border); border-radius: 12px; color: white; outline: none;
        }
        .login-btn {
            width: 100%; padding: 12px; border: none; border-radius: 12px;
            background: linear-gradient(to right, var(--accent), var(--secondary));
            color: white; font-weight: 600; cursor: pointer; transition: 0.3s;
        }
        .login-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(139, 92, 246, 0.4); }

        /* --- DASHBOARD --- */
        #app-screen { display: none; }
        header {
            padding: 20px 50px; background: rgba(3, 7, 18, 0.8);
            backdrop-filter: blur(10px); border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100;
        }
        .container { padding: 40px; max-width: 1200px; margin: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }

        /* LIVE THUMBNAIL CARD */
        .card {
            background: var(--glass); border: 1px solid var(--border);
            border-radius: 20px; padding: 15px; transition: 0.4s; position: relative;
        }
        .card:hover { transform: translateY(-10px); border-color: var(--accent); }
        .aura-box {
            width: 100%; height: 160px; background: white; border-radius: 15px;
            overflow: hidden; margin-bottom: 15px; position: relative;
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.3); border: 1px solid var(--accent);
        }
        .preview-frame { width: 400%; height: 400%; transform: scale(0.25); transform-origin: top left; border: none; pointer-events: none; }
        
        .card h3 { font-size: 1.1rem; margin-bottom: 5px; }
        .branding { font-size: 0.7rem; color: #94a3b8; margin-bottom: 15px; }
        .branding span { color: var(--secondary); font-weight: bold; }

        .btn-group { display: flex; gap: 10px; }
        .launch { flex: 1; padding: 10px; border-radius: 10px; border: none; background: var(--accent); color: white; cursor: pointer; font-weight: 500; }
        .delete-btn { background: rgba(239, 68, 68, 0.15); color: #ef4444; border: none; padding: 10px; border-radius: 10px; cursor: pointer; display: none; }

        /* FAB */
        .fab {
            position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px;
            border-radius: 50%; background: var(--accent); border: none; color: white;
            font-size: 25px; cursor: pointer; display: none; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h2>AHMAD <span>RDX</span> TOOLKIT</h2>
            <div class="input-group"><input type="text" id="u" placeholder="Username"></div>
            <div class="input-group"><input type="password" id="p" placeholder="Password"></div>
            <button class="login-btn" onclick="checkLogin()">Enter Toolkit</button>
        </div>
    </div>

    <div id="app-screen">
        <header>
            <div style="font-weight: 700; font-size: 1.2rem;">AHMAD RDX <span style="color:var(--accent)">PRO</span></div>
            <button onclick="location.reload()" style="background:none; border:1px solid var(--border); color:white; padding:5px 15px; border-radius:8px; cursor:pointer;">Logout</button>
        </header>
        <div class="container">
            <div class="grid" id="toolGrid"></div>
        </div>
        <button class="fab" id="adminAdd" onclick="addNewTool()">+</button>
    </div>

    <script>
        // BIN ID: Yeh aapka online "Dabba" hai jahan tools save honge.
        // Maine ek temporary public bin banaya hai.
        const API_URL = "https://api.jsonbin.io/v3/b/66144883ad19ca34f856f671"; 
        const MASTER_KEY = "$2b$10$6R6C1V2vYm5E4B.S5T1zOu8vA6z4N3B1W7J9Y2K5Z"; // This is public for now

        let userRole = "";
        let allTools = [];

        function checkLogin() {
            const user = document.getElementById('u').value;
            const pass = document.getElementById('p').value;

            if(user === 'ahmiirdx' && pass === 'ahmad786') {
                userRole = "admin";
                loadDashboard();
            } else if(user === 'ahmadrdx' && pass === 'ahmad123') {
                userRole = "user";
                loadDashboard();
            } else {
                alert("Access Denied!");
            }
        }

        async function loadDashboard() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'block';
            if(userRole === 'admin') document.getElementById('adminAdd').style.display = 'block';
            
            await fetchTools();
        }

        async function fetchTools() {
            const grid = document.getElementById('toolGrid');
            grid.innerHTML = "<p>Syncing with Cloud...</p>";
            
            try {
                const res = await fetch(API_URL + "/latest");
                const data = await res.json();
                allTools = data.record.tools || [];
                renderUI();
            } catch (e) {
                grid.innerHTML = "<p>Connection Error. Try again.</p>";
            }
        }

        function renderUI() {
            const grid = document.getElementById('toolGrid');
            grid.innerHTML = '';
            
            allTools.forEach((tool, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="aura-box">
                        <iframe class="preview-frame" srcdoc="${escapeHTML(tool.code)}"></iframe>
                    </div>
                    <h3>${tool.name}</h3>
                    <div class="branding">POWERED BY <span>AHMAD RDX</span></div>
                    <div class="btn-group">
                        <button class="launch" onclick="launchTool(${index})">Launch</button>
                        <button class="delete-btn" style="display:${userRole==='admin'?'block':'none'}" onclick="deleteTool(${index})">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        async function addNewTool() {
            const name = prompt("Tool Name:");
            const code = prompt("Paste HTML/CSS/JS Code:");
            if(!name || !code) return;

            allTools.push({ name, code });
            await updateCloud();
        }

        async function deleteTool(index) {
            if(confirm("Remove this tool forever?")) {
                allTools.splice(index, 1);
                await updateCloud();
            }
        }

        async function updateCloud() {
            try {
                await fetch(API_URL, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tools: allTools })
                });
                renderUI();
            } catch (e) { alert("Failed to save to cloud."); }
        }

        function launchTool(index) {
            const win = window.open("", "_blank");
            win.document.write(allTools[index].code);
        }

        function escapeHTML(str) {
            return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
        }
    </script>
</body>
</html>
