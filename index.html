<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Tools Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0f172a;
            --primary: #8b5cf6;
            --secondary: #ec4899;
            --text-light: #f8fafc;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(139, 92, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(236, 72, 153, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-light);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Header */
        header {
            text-align: center;
            padding: 40px 20px;
            background: linear-gradient(to right, rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 0.4));
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        header h1 {
            font-size: 2.5rem;
            background: linear-gradient(to right, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }

        header p {
            color: #94a3b8;
            margin-top: 5px;
            font-weight: 300;
        }

        /* Container & Grid */
        .container {
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }

        /* Tool Cards (Glassmorphism) */
        .tool-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            height: 400px; /* Fixed height for tools */
        }

        .tool-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(139, 92, 246, 0.2);
            border-color: rgba(139, 92, 246, 0.3);
        }

        .tool-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--glass-border);
        }

        .tool-header h3 {
            font-size: 1.2rem;
            color: #e2e8f0;
        }

        .delete-btn {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .delete-btn:hover {
            background: #ef4444;
            color: white;
        }

        /* iframe container for tools */
        .tool-content {
            flex-grow: 1;
            border-radius: 12px;
            overflow: hidden;
            background: #ffffff; /* White bg for embedded tools to display properly */
        }

        .tool-content iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Floating Action Button */
        .fab-btn {
            position: fixed;
            bottom: 40px;
            right: 40px;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            font-size: 30px;
            border: none;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(236, 72, 153, 0.4);
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .fab-btn:hover {
            transform: scale(1.1) rotate(90deg);
        }

        /* Modal / Popup */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-box {
            background: #1e293b;
            border: 1px solid var(--glass-border);
            padding: 40px;
            border-radius: 24px;
            width: 90%;
            max-width: 600px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            transform: translateY(50px);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-overlay.active .modal-box {
            transform: translateY(0);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .modal-header h2 {
            background: linear-gradient(to right, #a78bfa, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .close-modal {
            background: transparent;
            color: #94a3b8;
            border: none;
            font-size: 24px;
            cursor: pointer;
            transition: 0.2s;
        }

        .close-modal:hover {
            color: white;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #cbd5e1;
            font-weight: 300;
        }

        .input-group input, .input-group textarea {
            width: 100%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid #334155;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus, .input-group textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
        }

        .input-group textarea {
            height: 200px;
            resize: vertical;
            font-family: monospace; /* For code typing */
        }

        .save-btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(139, 92, 246, 0.3);
        }

        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(139, 92, 246, 0.5);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            grid-column: 1 / -1;
            padding: 100px 20px;
            color: #64748b;
        }
        .empty-state i {
            font-size: 60px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

    </style>
</head>
<body>

    <header>
        <h1><i class="fa-solid fa-layer-group"></i> My Premium Workspace</h1>
        <p>All your custom web tools in one beautiful place</p>
    </header>

    <div class="container">
        <div class="tools-grid" id="toolsGrid">
            </div>
    </div>

    <button class="fab-btn" id="openModalBtn">
        <i class="fa-solid fa-plus"></i>
    </button>

    <div class="modal-overlay" id="addToolModal">
        <div class="modal-box">
            <div class="modal-header">
                <h2>Add New Tool</h2>
                <button class="close-modal" id="closeModalBtn"><i class="fa-solid fa-xmark"></i></button>
            </div>
            
            <div class="input-group">
                <label for="toolName">Tool Name</label>
                <input type="text" id="toolName" placeholder="e.g. Calculator, Text Formatter..." autocomplete="off">
            </div>

            <div class="input-group">
                <label for="toolCode">HTML, CSS & JS Code</label>
                <textarea id="toolCode" placeholder="Paste your working HTML tool code here..."></textarea>
            </div>

            <button class="save-btn" id="saveToolBtn">Add Tool to Hub</button>
        </div>
    </div>

    <script>
        // Array to store our tools
        let myTools = JSON.parse(localStorage.getItem('premiumTools')) || [];

        // DOM Elements
        const toolsGrid = document.getElementById('toolsGrid');
        const modal = document.getElementById('addToolModal');
        const openBtn = document.getElementById('openModalBtn');
        const closeBtn = document.getElementById('closeModalBtn');
        const saveBtn = document.getElementById('saveToolBtn');
        
        const toolNameInput = document.getElementById('toolName');
        const toolCodeInput = document.getElementById('toolCode');

        // Open Modal
        openBtn.addEventListener('click', () => {
            modal.classList.add('active');
            toolNameInput.focus();
        });

        // Close Modal
        closeBtn.addEventListener('click', closeModal);
        
        // Close modal if clicked outside the box
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });

        function closeModal() {
            modal.classList.remove('active');
            toolNameInput.value = '';
            toolCodeInput.value = '';
        }

        // Save Tool Function
        saveBtn.addEventListener('click', () => {
            const name = toolNameInput.value.trim();
            const code = toolCodeInput.value.trim();

            if (!name || !code) {
                alert("Please enter both Tool Name and HTML Code.");
                return;
            }

            const newTool = {
                id: Date.now(), // unique ID
                name: name,
                code: code
            };

            myTools.push(newTool);
            saveToLocalStorage();
            renderTools();
            closeModal();
        });

        // Delete Tool Function
        function deleteTool(id) {
            if(confirm("Are you sure you want to remove this tool?")) {
                myTools = myTools.filter(tool => tool.id !== id);
                saveToLocalStorage();
                renderTools();
            }
        }

        // Save to Browser Storage
        function saveToLocalStorage() {
            localStorage.setItem('premiumTools', JSON.stringify(myTools));
        }

        // Render Tools to Grid
        function renderTools() {
            toolsGrid.innerHTML = ''; // Clear current grid

            if (myTools.length === 0) {
                toolsGrid.innerHTML = `
                    <div class="empty-state">
                        <i class="fa-solid fa-box-open"></i>
                        <h2>Your workspace is empty!</h2>
                        <p>Click the + button to add your first custom tool.</p>
                    </div>
                `;
                return;
            }

            myTools.forEach(tool => {
                const card = document.createElement('div');
                card.className = 'tool-card';

                // Create the Header (Title + Delete Button)
                const header = document.createElement('div');
                header.className = 'tool-header';
                
                const title = document.createElement('h3');
                title.innerHTML = `<i class="fa-solid fa-wrench" style="color: var(--primary); margin-right: 8px;"></i> ${tool.name}`;
                
                const delBtn = document.createElement('button');
                delBtn.className = 'delete-btn';
                delBtn.innerHTML = '<i class="fa-solid fa-trash"></i>';
                delBtn.onclick = () => deleteTool(tool.id);

                header.appendChild(title);
                header.appendChild(delBtn);

                // Create the Iframe for the tool
                // srcdoc safely renders the complete HTML code without affecting main site CSS
                const contentDiv = document.createElement('div');
                contentDiv.className = 'tool-content';
                
                const iframe = document.createElement('iframe');
                iframe.srcdoc = tool.code; 
                
                contentDiv.appendChild(iframe);

                // Assemble Card
                card.appendChild(header);
                card.appendChild(contentDiv);

                // Add to Grid
                toolsGrid.appendChild(card);
            });
        }

        // Initial Render on Page Load
        renderTools();

    </script>
</body>
</html>
